const questionsBank = [
    // FONDAMENTAUX (18)
    { thematic:"Fondamentaux", question:"Dans un cluster KRaft, que se passe-t-il si le nĹud contrĂ´leur leader tombe ?", options:["Un nouveau leader est ĂŠlu parmi les autres contrĂ´leurs","Le cluster devient indisponible","Un broker devient contrĂ´leur","Le cluster redĂŠmarre"], correctAnswer:"Un nouveau leader est ĂŠlu parmi les autres contrĂ´leurs", explanation:"KRaft utilise le protocole Raft. Les contrĂ´leurs forment un quorum. Si le leader tombe, un autre contrĂ´leur est ĂŠlu automatiquement.", tip:"Utilisez un nombre impair de contrĂ´leurs (3 ou 5) pour une haute disponibilitĂŠ." },
    { thematic:"Fondamentaux", question:"Que signifie le paramĂ¨tre `min.insync.replicas` dans un contexte de facteur de rĂŠplication 3 ?", options:["Au moins 2 rĂŠplicas ISR pour accepter les ĂŠcritures acks=all","Au moins 3 rĂŠplicas","Au moins 1 rĂŠplica","Au moins 2 rĂŠplicas quel que soit leur ĂŠtat"], correctAnswer:"Au moins 2 rĂŠplicas ISR pour accepter les ĂŠcritures acks=all", explanation:"Avec RF=3 et min.insync=2, le broker tolĂ¨re la perte d'un broker. Les ĂŠcritures acks=all ĂŠchouent s'il ne reste que 1 ISR.", tip:"C'est le rĂŠglage recommandĂŠ pour un cluster de production." },
    { thematic:"Fondamentaux", question:"Quel est l'impact de `unclean.leader.election.enable=true` sur la durabilitĂŠ ?", options:["Risque de perte de donnĂŠes car un rĂŠplica non Ă  jour peut devenir leader","AmĂŠliore la durabilitĂŠ","Augmente la disponibilitĂŠ sans risque","Ne change rien"], correctAnswer:"Risque de perte de donnĂŠes car un rĂŠplica non Ă  jour peut devenir leader", explanation:"Si tous les ISR sont perdus, un rĂŠplica non-ISR peut ĂŞtre ĂŠlu leader, mais il peut manquer des messages.", tip:"Gardez false pour les donnĂŠes critiques." },
    { thematic:"Fondamentaux", question:"Quelle mĂŠtrique indique qu'un broker est surchargĂŠ en requĂŞtes rĂŠseau ?", options:["NetworkProcessorAvgIdlePercent < 30%","UnderReplicatedPartitions","LeaderCount","RequestHandlerAvgIdlePercent"], correctAnswer:"NetworkProcessorAvgIdlePercent < 30%", explanation:"Cette mĂŠtrique mesure le temps d'inactivitĂŠ des threads rĂŠseau. Une valeur basse indique une saturation.", tip:"Augmentez `num.network.threads` si cette mĂŠtrique est constamment basse." },
    { thematic:"Fondamentaux", question:"Comment fonctionne la compaction de logs (log compaction) ?", options:["Ne garde que la derniĂ¨re valeur pour chaque clĂŠ, supprime les anciennes","Supprime tous les messages","Supprime les messages en fonction de leur taille","Supprime les messages aprĂ¨s un dĂŠlai"], correctAnswer:"Ne garde que la derniĂ¨re valeur pour chaque clĂŠ, supprime les anciennes", explanation:"La compaction est idĂŠale pour les topics de type 'table' (ex: rĂŠfĂŠrentiel). Elle garantit qu'au moins la derniĂ¨re version de chaque clĂŠ est conservĂŠe.", tip:"Activez avec `log.cleanup.policy=compact`." },
    { thematic:"Fondamentaux", question:"Quel est le comportement par dĂŠfaut de `auto.leader.rebalance.enable` ?", options:["RĂŠĂŠquilibre automatiquement les leaders pour revenir aux leaders prĂŠfĂŠrĂŠs","DĂŠsactivĂŠ","RĂŠĂŠquilibre toutes les heures","RĂŠĂŠquilibre les partitions"], correctAnswer:"RĂŠĂŠquilibre automatiquement les leaders pour revenir aux leaders prĂŠfĂŠrĂŠs", explanation:"Kafka vĂŠrifie pĂŠriodiquement les dĂŠsĂŠquilibres et rĂŠĂŠlit les leaders prĂŠfĂŠrĂŠs pour ĂŠquilibrer la charge.", tip:"Laissez true, mais surveillez les rĂŠĂŠquilibrages." },
    { thematic:"Fondamentaux", question:"Que signifie `log.roll.ms` comparĂŠ Ă  `log.segment.bytes` ?", options:["log.roll.ms = durĂŠe max avant crĂŠation nouveau segment, log.segment.bytes = taille max","log.roll.ms = taille","log.segment.bytes = durĂŠe","Identiques"], correctAnswer:"log.roll.ms = durĂŠe max avant crĂŠation nouveau segment, log.segment.bytes = taille max", explanation:"Le segment est fermĂŠ quand l'une des conditions est atteinte.", tip:"Des segments trop petits augmentent le nombre de fichiers." },
    { thematic:"Fondamentaux", question:"Quelle est la diffĂŠrence entre `fetch.min.bytes` et `fetch.max.wait.ms` ?", options:["fetch.min.bytes = donnĂŠes minimales, fetch.max.wait.ms = dĂŠlai d'attente max","fetch.min.bytes = dĂŠlai, fetch.max.wait.ms = donnĂŠes","MĂŞme chose","LiĂŠs Ă  la compression"], correctAnswer:"fetch.min.bytes = donnĂŠes minimales, fetch.max.wait.ms = dĂŠlai d'attente max", explanation:"Le broker attend d'avoir au moins fetch.min.bytes ou que fetch.max.wait.ms soit ĂŠcoulĂŠ.", tip:"Ajustez pour ĂŠquilibrer latence/dĂŠbit." },
    { thematic:"Fondamentaux", question:"Comment fonctionne l'ĂŠlection d'un nouveau leader lorsqu'un broker tombe ?", options:["Le contrĂ´leur choisit le premier rĂŠplica dans la liste des ISR","Le consommateur choisit","Le producteur choisit","C'est alĂŠatoire"], correctAnswer:"Le contrĂ´leur choisit le premier rĂŠplica dans la liste des ISR", explanation:"Parmi les rĂŠplicas ISR, le contrĂ´leur sĂŠlectionne le premier de la liste (le leader prĂŠfĂŠrĂŠ).", tip:"Assurez-vous que les ISR sont bien rĂŠpartis." },
    { thematic:"Fondamentaux", question:"Que signifie `log.retention.check.interval.ms` ?", options:["Intervalle de vĂŠrification des conditions de rĂŠtention","Intervalle de compaction","Intervalle de rĂŠplication","Intervalle de nettoyage"], correctAnswer:"Intervalle de vĂŠrification des conditions de rĂŠtention", explanation:"Le thread de nettoyage vĂŠrifie pĂŠriodiquement si des segments doivent ĂŞtre supprimĂŠs.", tip:"Par dĂŠfaut 5 minutes." },
    { thematic:"Fondamentaux", question:"Quel est l'effet de `num.io.threads` sur un broker ?", options:["Nombre de threads pour traiter les requĂŞtes (lecture/ĂŠcriture disque)","Threads rĂŠseau","Threads de rĂŠplication","Threads de nettoyage"], correctAnswer:"Nombre de threads pour traiter les requĂŞtes (lecture/ĂŠcriture disque)", explanation:"Ces threads effectuent le travail rĂŠel sur les partitions.", tip:"Surveillez `RequestHandlerAvgIdlePercent`." },
    { thematic:"Fondamentaux", question:"Qu'est-ce que le `quorum` dans KRaft ?", options:["Ensemble de contrĂ´leurs qui votent","Ensemble de brokers","Ensemble des topics","Ensemble des partitions"], correctAnswer:"Ensemble de contrĂ´leurs qui votent", explanation:"Le quorum KRaft dĂŠcide de l'ĂŠlection du leader et de la validation des mĂŠtadonnĂŠes.", tip:"Un quorum doit avoir une majoritĂŠ (N/2+1)." },
    { thematic:"Fondamentaux", question:"Comment configurer un broker pour accepter des messages jusqu'Ă  10 Mo ?", options:["message.max.bytes=10485760","max.message.bytes=10MB","record.max.size=10485760","kafka.message.max.bytes"], correctAnswer:"message.max.bytes=10485760", explanation:"Par dĂŠfaut 1 Mo. Augmentez aussi `replica.fetch.max.bytes` pour la rĂŠplication.", tip:"Testez l'impact sur la performance." },
    { thematic:"Fondamentaux", question:"Que permet `kafka-storage.sh format` ?", options:["Formater un rĂŠpertoire pour KRaft","CrĂŠer un topic","DĂŠmarrer un broker","Supprimer des logs"], correctAnswer:"Formater un rĂŠpertoire pour KRaft", explanation:"PrĂŠpare les logs de mĂŠtadonnĂŠes pour un contrĂ´leur ou un broker KRaft.", tip:"NĂŠcessaire avant premier dĂŠmarrage." },
    { thematic:"Fondamentaux", question:"Quel outil permet de gĂŠnĂŠrer un plan de rĂŠaffectation des partitions ?", options:["kafka-reassign-partitions.sh --generate","kafka-rebalance.sh","kafka-move-leader.sh","kafka-partition-mover"], correctAnswer:"kafka-reassign-partitions.sh --generate", explanation:"GĂŠnĂ¨re un plan JSON qui ĂŠquilibre les rĂŠplicas sur les brokers.", tip:"Utilisez `--broker-list` pour spĂŠcifier les brokers cibles." },
    { thematic:"Fondamentaux", question:"Comment fonctionne la dĂŠtection des brokers morts avec KRaft ?", options:["Via des heartbeats sur le protocole Raft","Via ZooKeeper","Via le contrĂ´leur","Via les clients"], correctAnswer:"Via des heartbeats sur le protocole Raft", explanation:"Les brokers envoient des heartbeats aux contrĂ´leurs, qui gĂ¨rent le quorum.", tip:"Configurez `controller.quorum.election.timeout.ms`." },
    { thematic:"Fondamentaux", question:"Que mesure `kafka.controller:type=KafkaController,name=OfflinePartitionsCount` ?", options:["Nombre de partitions sans leader","Nombre de partitions sous-rĂŠpliquĂŠes","Nombre de partitions prĂŠfĂŠrĂŠes","Nombre de partitions en cours de rĂŠassignation"], correctAnswer:"Nombre de partitions sans leader", explanation:"C'est critique, les partitions sont inaccessibles.", tip:"Alertez immĂŠdiatement." },
    { thematic:"Fondamentaux", question:"Quel est l'impact de `replica.fetch.max.bytes` trop bas ?", options:["Les followers peuvent ĂŞtre en retard si les messages sont gros","RĂŠplication plus rapide","Moins de rĂŠseau","Plus de mĂŠmoire"], correctAnswer:"Les followers peuvent ĂŞtre en retard si les messages sont gros", explanation:"Si un message dĂŠpasse cette taille, le follower ne peut pas le rĂŠpliquer.", tip:"Doit ĂŞtre >= `message.max.bytes`." },
    // DĂVELOPPEMENT (22)
    { thematic:"DĂŠveloppement", question:"Comment implĂŠmenter exactly-once entre un consommateur et un producteur sans Kafka Streams ?", options:["Utiliser `sendOffsetsToTransaction` avec un producteur transactionnel","Impossible","Avec idempotence seulement","Avec exactly-once source"], correctAnswer:"Utiliser `sendOffsetsToTransaction` avec un producteur transactionnel", explanation:"Le consommateur lit, le producteur envoie dans une transaction, et les offsets sont commitĂŠs dans la mĂŞme transaction.", tip:"Complexe, prĂŠfĂŠrez Kafka Streams." },
    { thematic:"DĂŠveloppement", question:"Que signifie `KafkaConsumer.wakeup()` et quand l'utiliser ?", options:["Interrompt un poll() bloquĂŠ, typiquement dans un shutdown hook","RĂŠveille le consommateur","Commite les offsets","RedĂŠmarre"], correctAnswer:"Interrompt un poll() bloquĂŠ, typiquement dans un shutdown hook", explanation:"Lance une `WakeupException` dans le thread en poll().", tip:"Appelez `consumer.wakeup()` depuis un thread diffĂŠrent." },
    { thematic:"DĂŠveloppement", question:"Quel est l'effet de `max.in.flight.requests.per.connection=1` ?", options:["Garantit l'ordre des messages mĂŞme en cas de retries","DĂŠtĂŠriore le dĂŠbit","Augmente la latence","Tout ce qui prĂŠcĂ¨de"], correctAnswer:"Tout ce qui prĂŠcĂ¨de", explanation:"Limiter Ă  1 garantit l'ordre mais rĂŠduit le parallĂŠlisme.", tip:"Avec idempotence, on peut monter Ă  5 tout en gardant l'ordre." },
    { thematic:"DĂŠveloppement", question:"Comment configurer un producteur pour utiliser exactly-once avec des transactions sur plusieurs topics ?", options:["beginTransaction(), send() sur plusieurs topics, commitTransaction()","C'est impossible","Il faut plusieurs producteurs","Il faut des idempotence sĂŠparĂŠes"], correctAnswer:"beginTransaction(), send() sur plusieurs topics, commitTransaction()", explanation:"Les transactions Kafka sont atomiques sur tous les topics.", tip:"Utilisez `sendOffsetsToTransaction` pour consommer-produire." },
    { thematic:"DĂŠveloppement", question:"Que signifie `client.dns.lookup=resolve_canonical_bootstrap_servers` ?", options:["RĂŠsout le nom canonique (FQDN) pour chaque broker","Utilise toutes les IPs","DĂŠsactive la rĂŠsolution","Utilise le DNS round-robin"], correctAnswer:"RĂŠsout le nom canonique (FQDN) pour chaque broker", explanation:"Utile lorsque les brokers ont des noms canoniques diffĂŠrents de leur adresse bootstrap.", tip:"Utilisez dans les environnements Kubernetes." },
    { thematic:"DĂŠveloppement", question:"Comment gĂŠrer un rebalance en sauvegardant l'ĂŠtat ?", options:["ImplĂŠmenter `onPartitionsRevoked` dans `ConsumerRebalanceListener`","ImplĂŠmenter `onPartitionsAssigned`","ImplĂŠmenter `onRebalance`","ImplĂŠmenter `onPartitionLost`"], correctAnswer:"ImplĂŠmenter `onPartitionsRevoked` dans `ConsumerRebalanceListener`", explanation:"Avant la rĂŠvocation, on peut commiter les offsets ou sauvegarder l'ĂŠtat.", tip:"Pour exactly-once, utilisez `sendOffsetsToTransaction`." },
    { thematic:"DĂŠveloppement", question:"Quel est l'impact de `delivery.timeout.ms` sur un producteur ?", options:["Timeout total pour l'envoi d'un message (retries inclus)","Timeout de connexion","Timeout de requĂŞte","Timeout de batch"], correctAnswer:"Timeout total pour l'envoi d'un message (retries inclus)", explanation:"Si dĂŠpassĂŠ, le message ĂŠchoue. Doit ĂŞtre > request.timeout.ms + retry.backoff.ms * retries.", tip:"Par dĂŠfaut 2 minutes." },

function shuffle(arr) { for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
function filterByDomains() {
    let domains=[];
    if(document.getElementById("dom-fund").checked) domains.push("Fondamentaux");
    if(document.getElementById("dom-dev").checked) domains.push("DĂŠveloppement");
    if(document.getElementById("dom-streams").checked) domains.push("Kafka Streams");
    if(document.getElementById("dom-connect").checked) domains.push("Kafka Connect");
    if(document.getElementById("dom-test").checked) domains.push("Tests");
    if(document.getElementById("dom-obs").checked) domains.push("ObservabilitĂŠ");
    if(domains.length===0) return questionsBank;
    return questionsBank.filter(q => domains.includes(q.thematic));
}
function startQuiz() {
    let count = parseInt(document.getElementById("question-count").value);
    let filtered = filterByDomains();
    if(filtered.length < count) count = filtered.length;
    currentQuestions = shuffle(filtered).slice(0, count);
    userAnswers = new Array(currentQuestions.length).fill(null);
    score = 0; currentIdx = 0;
    document.getElementById("settings-panel").classList.add("d-none");
    document.getElementById("quiz-content").classList.remove("d-none");
    updateScore();
    displayQuestion(0);
}
function displayQuestion(idx) {
    let q = currentQuestions[idx];
    document.getElementById("question-text").innerText = q.question;
    let badgeSpan = document.getElementById("thematic-badge");
    badgeSpan.innerText = q.thematic;
    badgeSpan.className = "thematic-badge " + (badgeMap[q.thematic] || "badge-fund");
    let container = document.getElementById("options-container");
    container.innerHTML = "";
    let shuffledOpts = shuffle([...q.options]);
    shuffledOpts.forEach(opt => {
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.className = "btn option-btn";
        btn.onclick = () => selectAnswer(btn, opt, idx);
        container.appendChild(btn);
    });
    document.getElementById("explanation-box").classList.add("d-none");
    if(userAnswers[idx] !== null) showFeedback(idx);
    updateProgress();
    updateNav();
}
function selectAnswer(btn, selected, idx) {
    if(userAnswers[idx] !== null) return;
    let q = currentQuestions[idx];
    let isCorrect = (selected === q.correctAnswer);
    if(isCorrect) score++;
    userAnswers[idx] = { selected, correct: q.correctAnswer, isCorrect };
    updateScore();
    showFeedback(idx);
}
function showFeedback(idx) {
    let ans = userAnswers[idx];
    if(!ans) return;
    let q = currentQuestions[idx];
    let btns = document.querySelectorAll(".option-btn");
    btns.forEach(btn => { btn.disabled = true; if(btn.innerText === ans.correct) btn.classList.add("correct"); if(btn.innerText === ans.selected && !ans.isCorrect) btn.classList.add("incorrect"); });
    document.getElementById("explanation-text").innerHTML = q.explanation;
    document.getElementById("explanation-title").innerHTML = ans.isCorrect ? "â Correct !" : "â Incorrect";
    document.getElementById("explanation-box").classList.remove("d-none");
    let tipDiv = document.getElementById("tip-box");
    if(q.tip) { document.getElementById("tip-text").innerHTML = q.tip; tipDiv.classList.remove("d-none"); }
    else tipDiv.classList.add("d-none");
}
function updateProgress() { let perc = ((currentIdx+1)/currentQuestions.length)*100; document.getElementById("progress-bar").style.width=perc+"%"; document.getElementById("question-counter").innerText=`Question ${currentIdx+1}/${currentQuestions.length}`; }
function updateScore() { document.getElementById("current-score").innerText=`Score: ${score}/${currentQuestions.length}`; }
function updateNav() { document.getElementById("prev-btn").disabled = (currentIdx===0); let isLast = (currentIdx===currentQuestions.length-1); document.getElementById("next-btn").classList.toggle("d-none", isLast); document.getElementById("finish-btn").classList.toggle("d-none", !isLast); }
function next() { if(currentIdx < currentQuestions.length-1) { currentIdx++; displayQuestion(currentIdx); } }
function prev() { if(currentIdx > 0) { currentIdx--; displayQuestion(currentIdx); } }
function finish() { showModal(); }
function showModal() {
    let percent = (score/currentQuestions.length)*100;
    document.getElementById("final-score-percentage").innerText = `${percent.toFixed(0)}%`;
    document.getElementById("final-score-text").innerHTML = `${score}/${currentQuestions.length} bonnes rĂŠponses`;
    let tech=0, strat=0, tot=0;
    userAnswers.forEach((a,i)=>{ if(a){ tot++; if(["Fondamentaux","DĂŠveloppement","Kafka Streams"].includes(currentQuestions[i].thematic)) { if(a.isCorrect) tech++; } else { if(a.isCorrect) strat++; } } });
    tech = tot? (tech/tot)*100:0; strat = tot? (strat/tot)*100:0;
    document.getElementById("tech-skills").style.width=tech+"%"; document.getElementById("tech-skills-text").innerHTML=`Niveau technique ${tech.toFixed(0)}%`;
    document.getElementById("strat-skills").style.width=strat+"%"; document.getElementById("strat-skills-text").innerHTML=`Patterns & ObservabilitĂŠ ${strat.toFixed(0)}%`;
    let recos = percent>=80 ? "FĂŠlicitations ! Vous ĂŞtes prĂŞt pour la certification CCDAK." : (percent>=60 ? "Bon niveau, rĂŠvisez les domaines oĂš vous avez ĂŠchouĂŠ." : "Reprenez les sĂŠries V1 et V2.");
    document.getElementById("final-recommendations").innerHTML = `<div class="alert alert-info">${recos}</div>`;
    document.getElementById("short-term").innerHTML = "Relisez les explications des questions fausses. Pratiquez avec des clusters rĂŠels.";
    document.getElementById("long-term").innerHTML = "Passez l'examen CCDAK officiel. FĂŠlicitations pour votre progression !";
    new bootstrap.Modal(document.getElementById("resultsModal")).show();
}
function restart() { document.getElementById("settings-panel").classList.remove("d-none"); document.getElementById("quiz-content").classList.add("d-none"); let modal = bootstrap.Modal.getInstance(document.getElementById("resultsModal")); if(modal) modal.hide(); }
document.getElementById("start-quiz-btn").onclick = startQuiz;
document.getElementById("next-btn").onclick = next;
document.getElementById("prev-btn").onclick = prev;
document.getElementById("finish-btn").onclick = finish;
document.getElementById("restart-quiz-btn").onclick = restart;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

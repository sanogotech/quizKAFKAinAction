<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz CCDAK · Série 4 · 80 questions expert</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:linear-gradient(145deg,#0b1120,#1a2639);padding:1.5rem;min-height:100vh;}
        .quiz-wrapper{max-width:1200px;margin:0 auto;}
        .quiz-card{background:rgba(255,255,255,0.98);border-radius:2rem;overflow:hidden;box-shadow:0 25px 45px -12px rgba(0,0,0,0.4);}
        .quiz-header{background:linear-gradient(135deg,#1a1e2c,#2d3e50);padding:2rem;color:white;border-bottom:4px solid #e63946;}
        .badge-kafka{background:#e63946;padding:0.3rem 1.2rem;border-radius:40px;font-weight:600;font-size:0.85rem;display:inline-block;}
        .progress-container{background:#f1f5f9;margin:1.5rem;padding:1rem;border-radius:1rem;}
        .progress-bar-custom{background:linear-gradient(90deg,#f4a261,#e63946);}
        .thematic-badge{display:inline-flex;align-items:center;gap:0.4rem;padding:0.4rem 1rem;border-radius:50px;font-weight:600;font-size:0.8rem;margin-bottom:1rem;}
        .badge-fund{background:#e0f2fe;color:#0369a1;}
        .badge-dev{background:#dcfce7;color:#166534;}
        .badge-streams{background:#fae8ff;color:#86198f;}
        .badge-connect{background:#fff3e3;color:#b45309;}
        .badge-test{background:#e0e7ff;color:#3730a3;}
        .badge-obs{background:#ffedea;color:#c2410c;}
        .option-btn{width:100%;text-align:left;padding:0.9rem 1.2rem;margin-bottom:0.7rem;border:1.5px solid #e2e8f0;border-radius:1rem;background:white;font-weight:500;transition:0.2s;}
        .option-btn:hover:not([disabled]){border-color:#e63946;background:#fff5f5;transform:translateY(-2px);}
        .option-btn.correct{background:#ecfdf5;border-color:#10b981;color:#065f46;}
        .option-btn.incorrect{background:#fef2f2;border-color:#f97316;color:#7f1d1d;}
        .explanation-box{padding:1rem;border-radius:1rem;background:#f8fafc;border-left:5px solid #e63946;margin-top:1.2rem;}
        .tip-box{background:#fffbeb;border-left:4px solid #f4a261;padding:0.7rem;border-radius:0.8rem;margin-top:0.8rem;}
        .btn-kafka{background:#e63946;color:white;border:none;}
        .btn-kafka:hover{background:#b91c1c;transform:translateY(-2px);}
        .final-score{font-size:3.5rem;font-weight:800;background:linear-gradient(135deg,#e63946,#f4a261);-webkit-background-clip:text;background-clip:text;color:transparent;}
        @media (max-width:768px){body{padding:0.8rem;}.quiz-header h1{font-size:1.5rem;}}
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <div class="quiz-card">
        <div class="quiz-header">
            <div class="d-flex flex-wrap justify-content-between align-items-center">
                <div><h1><i class="fab fa-java me-2"></i> CCDAK · Série 4</h1><p class="mb-0 opacity-75">80 questions expert · scénarios avancés</p></div>
                <div><span class="badge-kafka"><i class="fas fa-brain"></i> Niveau expert</span></div>
            </div>
        </div>

        <div id="settings-panel" class="p-4">
            <h4><i class="fas fa-sliders-h"></i> Configuration</h4>
            <div class="row g-3 mt-2">
                <div class="col-md-5">
                    <label class="form-label fw-semibold">Nombre de questions</label>
                    <select id="question-count" class="form-select">
                        <option value="30">30 questions (rapide)</option>
                        <option value="50">50 questions (standard)</option>
                        <option value="80" selected>80 questions (complet)</option>
                    </select>
                </div>
                <div class="col-md-7 d-flex align-items-end"><button id="start-quiz-btn" class="btn btn-kafka w-100 py-2"><i class="fas fa-play"></i> Démarrer la série 4</button></div>
            </div>
            <div class="mt-4">
                <h6><i class="fas fa-tags"></i> Thèmes (filtres)</h6>
                <div class="row">
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-fund" checked> <label>📘 Fondamentaux</label></div></div>
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-dev" checked> <label>⚙️ Développement</label></div></div>
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-streams" checked> <label>🌊 Kafka Streams</label></div></div>
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-connect" checked> <label>🔌 Kafka Connect</label></div></div>
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-test" checked> <label>🧪 Tests</label></div></div>
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-obs" checked> <label>📊 Observabilité</label></div></div>
                </div>
            </div>
        </div>

        <div id="quiz-content" class="d-none">
            <div class="progress-container">
                <div class="d-flex justify-content-between"><span id="question-counter" class="fw-bold">Question 1 / 80</span><span id="current-score" class="fw-bold text-danger">Score: 0</span></div>
                <div class="progress mt-2" style="height: 10px;"><div id="progress-bar" class="progress-bar progress-bar-custom" style="width:0%"></div></div>
            </div>
            <div class="px-4 pb-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div id="thematic-badge" class="thematic-badge">Fondamentaux</div>
                        <h3 id="question-text" class="fs-4 fw-semibold mb-4"></h3>
                        <div id="options-container"></div>
                        <div id="explanation-box" class="explanation-box d-none">
                            <h5 id="explanation-title"><i class="fas fa-info-circle"></i> Explication</h5>
                            <p id="explanation-text"></p>
                            <div id="tip-box" class="tip-box d-none"><i class="fas fa-lightbulb text-warning"></i> <strong>Conseil :</strong> <span id="tip-text"></span></div>
                        </div>
                    </div>
                </div>
                <div class="d-flex flex-wrap justify-content-between mt-4 gap-2">
                    <button id="prev-btn" class="btn btn-outline-secondary" disabled><i class="fas fa-chevron-left"></i> Précédent</button>
                    <button id="next-btn" class="btn btn-kafka">Suivant <i class="fas fa-chevron-right"></i></button>
                    <button id="finish-btn" class="btn btn-outline-success d-none">Terminer</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="resultsModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white"><h5 class="modal-title"><i class="fab fa-apache"></i> Résultat CCDAK - Série 4</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body p-4 text-center"><div class="final-score" id="final-score-percentage">0%</div><p id="final-score-text" class="lead"></p>
            <div class="row"><div class="col-md-6"><div class="bg-light p-2 rounded"><div class="progress"><div id="tech-skills" class="progress-bar bg-danger" style="width:0%"></div></div><p id="tech-skills-text" class="mt-1 small"></p></div></div>
            <div class="col-md-6"><div class="bg-light p-2 rounded"><div class="progress"><div id="strat-skills" class="progress-bar bg-warning" style="width:0%"></div></div><p id="strat-skills-text" class="mt-1 small"></p></div></div></div>
            <hr><div id="final-recommendations"></div><p id="short-term" class="mt-2"></p><p id="long-term"></p></div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button><button id="restart-quiz-btn" class="btn btn-kafka">Recommencer</button></div>
        </div>
    </div>
</div>

<script>
// ======================= SÉRIE 4 : 80 QUESTIONS AVANCÉES =======================
const questionsBank = [
    // FONDAMENTAUX (approfondis)
    { thematic:"Fondamentaux", question:"Que se passe-t-il si un producteur envoie un message avec une clé null alors que le topic a une politique de compaction ?", options:["Le message est accepté mais ne sera pas compacté (car pas de clé)","Le message est refusé","La clé est générée automatiquement","Le message est ignoré"], correctAnswer:"Le message est accepté mais ne sera pas compacté (car pas de clé)", explanation:"La compaction ne s'applique qu'aux messages avec une clé. Les messages sans clé sont conservés selon la rétention classique.", tip:"Pour les topics compactés, assurez-vous que tous les messages ont une clé non nulle." },
    { thematic:"Fondamentaux", question:"Quel est l'impact de `num.io.threads` sur un broker ?", options:["Nombre de threads pour le traitement des requêtes (compression, décompression, etc.)","Threads réseau","Threads de réplication","Threads de nettoyage"], correctAnswer:"Nombre de threads pour le traitement des requêtes (compression, décompression, etc.)", explanation:"Ces threads effectuent le travail réel : lire/écrire sur disque, décompresser, etc. À augmenter pour les brokers avec beaucoup de requêtes.", tip:"Surveillez `RequestHandlerAvgIdlePercent`." },
    { thematic:"Fondamentaux", question:"Que signifie le paramètre `delete.topic.enable` ?", options:["Permet la suppression de topics (par défaut true)","Supprime les topics vides","Désactive la création","Active la rétention"], correctAnswer:"Permet la suppression de topics (par défaut true)", explanation:"Si false, les commandes `kafka-topics --delete` sont ignorées.", tip:"En production, gardez true pour permettre la maintenance." },
    { thematic:"Fondamentaux", question:"Quel est le rôle du `group.initial.rebalance.delay.ms` ?", options:["Délai avant le premier rééquilibrage pour permettre à tous les consommateurs de s'inscrire","Délai entre les rééquilibrages","Timeout de session","Délai de heartbeat"], correctAnswer:"Délai avant le premier rééquilibrage pour permettre à tous les consommateurs de s'inscrire", explanation:"Évite des rééquilibrages multiples au démarrage d'un grand groupe.", tip:"Augmentez pour les groupes très larges." },
    { thematic:"Fondamentaux", question:"Quelle est l'utilité de `kafka-verifiable-consumer` ?", options:["Consumer de test qui vérifie la réception de messages séquencés","Consumer standard","Consumer avec exactly-once","Consumer pour MirrorMaker"], correctAnswer:"Consumer de test qui vérifie la réception de messages séquencés", explanation:"Outil de validation de fiabilité : il attend des messages avec des séquences.", tip:"Utilisez avec `kafka-verifiable-producer`." },
    { thematic:"Fondamentaux", question:"Comment fonctionne la gestion des quotas (quotas) dans Kafka ?", options:["Limites de débit (byte/s) par client-id ou user","Limites de nombre de messages","Limites de connexions","Limites de CPU"], correctAnswer:"Limites de débit (byte/s) par client-id ou user", explanation:"Les quotas évitent qu'un client monopolise les ressources.", tip:"Définissez `client.quota.callback.class`." },
    { thematic:"Fondamentaux", question:"Que signifie `leader.replication.throttled.rate` ?", options:["Limite le débit de réplication sortant du leader","Limite le débit entrant du follower","Limite la compression","Limite le nombre de requêtes"], correctAnswer:"Limite le débit de réplication sortant du leader", explanation:"Utile lors de la réaffectation de partitions pour ne pas saturer le réseau.", tip:"Couplé avec `follower.replication.throttled.rate`." },
    { thematic:"Fondamentaux", question:"Quel est le format de stockage des offsets dans __consumer_offsets ?", options:["Un message par offset commité avec clé = groupe+topic+partition, valeur = offset+métadonnées","Un fichier séparé","Une base de données","Un segment spécial"], correctAnswer:"Un message par offset commité avec clé = groupe+topic+partition, valeur = offset+métadonnées", explanation:"Ce topic est compacté pour ne garder que le dernier offset par clé.", tip:"Ne modifiez jamais ce topic manuellement." },
    { thematic:"Fondamentaux", question:"Comment désactiver la création automatique des topics ?", options:["auto.create.topics.enable=false","create.topics.enable=false","topics.auto.create=false","disable.auto.create=true"], correctAnswer:"auto.create.topics.enable=false", explanation:"À mettre à false en production pour éviter la création accidentelle.", tip:"Utilisez l'AdminClient pour gérer les topics." },
    { thematic:"Fondamentaux", question:"Quelle est l'incidence d'un `replica.fetch.max.bytes` trop bas ?", options:["Les followers peuvent être en retard si les messages sont gros","Réplication plus rapide","Moins de réseau","Plus de mémoire"], correctAnswer:"Les followers peuvent être en retard si les messages sont gros", explanation:"Si un message dépasse cette taille, le follower ne peut pas le répliquer.", tip:"Doit être >= `message.max.bytes`." },
    { thematic:"Fondamentaux", question:"Que permet `kafka-replica-verification.sh` ?", options:["Vérifier la cohérence des réplicas","Vérifier les offsets","Tester les performances","Lister les réplicas"], correctAnswer:"Vérifier la cohérence des réplicas", explanation:"Compare les messages entre leader et followers pour détecter des divergences.", tip:"Utile après un unclean leader election." },
    { thematic:"Fondamentaux", question:"Quel est l'effet de `log.roll.ms` ?", options:["Durée avant de créer un nouveau segment même si la taille n'est pas atteinte","Délai de rétention","Intervalle de compaction","Intervalle de nettoyage"], correctAnswer:"Durée avant de créer un nouveau segment même si la taille n'est pas atteinte", explanation:"Évite que les segments restent ouverts trop longtemps.", tip:"Valeur par défaut : 7 jours." },
    { thematic:"Fondamentaux", question:"Comment fonctionne la priorité des leaders préférés ?", options:["Le réplica avec le plus petit numéro de broker est le leader préféré","Le premier réplica de la liste","Le plus rapide","Le plus récent"], correctAnswer:"Le premier réplica de la liste", explanation:"Lors de la création, le premier réplica listé est le leader préféré. L'outil `kafka-leader-election.sh` permet de rétablir les leaders préférés.", tip:"Équilibrez régulièrement." },
    { thematic:"Fondamentaux", question:"Qu'est-ce qu'un `fetch session` ?", options:["Une session de fetch entre un consommateur et un broker pour éviter les requêtes redondantes","Une session de réplication","Un groupe de fetch","Un type de requête"], correctAnswer:"Une session de fetch entre un consommateur et un broker pour éviter les requêtes redondantes", explanation:"Optimisation introduite dans Kafka 2.3 pour réduire la charge du broker.", tip:"Utilisez `fetch.session.id` pour le suivi." },
    { thematic:"Fondamentaux", question:"Quel paramètre contrôle le temps maximum d'attente d'un fetch avant de retourner des données ?", options:["fetch.max.wait.ms","fetch.min.bytes","max.poll.interval.ms","request.timeout.ms"], correctAnswer:"fetch.max.wait.ms", explanation:"Si `fetch.min.bytes` n'est pas atteint, le broker attend jusqu'à cette durée.", tip:"Réduire pour une latence plus faible." },
    { thematic:"Fondamentaux", question:"Que signifie le paramètre `unclean.leader.election.enable` au niveau d'un topic ?", options:["Permet l'élection d'un leader non-ISR pour ce topic","Hérite du broker","Force l'élection","Désactive l'élection"], correctAnswer:"Permet l'élection d'un leader non-ISR pour ce topic", explanation:"Peut être défini par topic, surchargeant la valeur du broker.", tip:"À utiliser avec précaution." },
    { thematic:"Fondamentaux", question:"Quel outil permet de générer un plan de réaffectation des partitions ?", options:["kafka-reassign-partitions.sh --generate","kafka-rebalance.sh","kafka-move-leader.sh","kafka-partition-mover"], correctAnswer:"kafka-reassign-partitions.sh --generate", explanation:"Génère un plan JSON qui équilibre les réplicas sur les brokers.", tip:"Utilisez `--broker-list` pour spécifier les brokers cibles." },
    { thematic:"Fondamentaux", question:"Comment fonctionne la détection des brokers morts avec KRaft ?", options:["Via des heartbeats sur le protocole Raft","Via ZooKeeper","Via le contrôleur","Via les clients"], correctAnswer:"Via des heartbeats sur le protocole Raft", explanation:"Les brokers envoient des heartbeats aux contrôleurs, qui gèrent le quorum.", tip:"Configurez `controller.quorum.election.timeout.ms`." },
    // DEVELOPPEMENT (scénarios)
    { thematic:"Développement", question:"Comment implémenter un exactly-once entre producteur et consommateur sans Streams ?", options:["Utiliser un producteur transactionnel et un consommateur avec `read_committed`","Impossible","Avec idempotence seulement","Avec exactly-once source"], correctAnswer:"Utiliser un producteur transactionnel et un consommateur avec `read_committed`", explanation:"Le consommateur en `read_committed` ne voit que les messages commités. Le producteur doit utiliser `initTransactions()` et `sendOffsetsToTransaction()`.", tip:"Complexe, préférez Kafka Streams." },
    { thematic:"Développement", question:"Que permet `KafkaConsumer.positions()` ?", options:["Retourner les offsets courants (prochains à lire) pour chaque partition","Retourner les offsets commités","Retourner les débuts de log","Retourner les fins de log"], correctAnswer:"Retourner les offsets courants (prochains à lire) pour chaque partition", explanation:"Position actuelle du consommateur (offset du prochain message à poll).", tip:"Utile pour le monitoring." },
    { thematic:"Développement", question:"Comment configurer un producteur pour utiliser des en-têtes personnalisés ?", options:["ProducerRecord(topic, partition, key, value, headers)","addHeader()","setHeaders()","header()"], correctAnswer:"ProducerRecord(topic, partition, key, value, headers)", explanation:"Les headers sont une liste de `RecordHeader` ajoutée lors de la construction du record.", tip:"Utilisez pour le tracing ou la métadonnée." },
    { thematic:"Développement", question:"Que fait `consumer.seekToEnd(Collection<TopicPartition>)` ?", options:["Déplace le curseur à la fin (dernier offset)","Déplace au début","Supprime les offsets","Commite"], correctAnswer:"Déplace le curseur à la fin (dernier offset)", explanation:"Les prochains poll() ne liront aucun nouveau message (sauf si de nouveaux arrivent).", tip:"Utile pour ignorer l'historique." },
    { thematic:"Développement", question:"Comment obtenir le nombre de messages dans une partition ?", options:["consumer.endOffsets() - consumer.beginningOffsets()","consumer.size()","consumer.getPartitionSize()","consumer.recordsSize()"], correctAnswer:"consumer.endOffsets() - consumer.beginningOffsets()", explanation:"`endOffsets` donne le LEO, `beginningOffsets` le start offset.", tip:"Peut être coûteux." },
    { thematic:"Développement", question:"Quel paramètre contrôle le temps d'attente pour la métadonnée du topic ?", options:["metadata.max.age.ms","metadata.timeout.ms","request.timeout.ms","connections.max.idle.ms"], correctAnswer:"metadata.max.age.ms", explanation:"La métadonnée est rafraîchie périodiquement (par défaut 5 min).", tip:"Réduire pour une détection plus rapide des nouveaux topics." },
    { thematic:"Développement", question:"Comment implémenter un backpressure avec le consommateur ?", options:["Utiliser `pause()` et `resume()`","Ralentir le polling","Augmenter `max.poll.records`","Diminuer `fetch.max.bytes`"], correctAnswer:"Utiliser `pause()` et `resume()`", explanation:"Pause suspend la réception sur certaines partitions sans rééquilibrage.", tip:"Reprendre après traitement." },
    { thematic:"Développement", question:"Que signifie `KafkaConsumer.wakeup()` ?", options:["Interrompt un poll() bloqué, utile pour arrêter proprement","Réveille le consommateur","Commite les offsets","Redémarre"], correctAnswer:"Interrompt un poll() bloqué, utile pour arrêter proprement", explanation:"Lance une exception `WakeupException` dans le thread en poll().", tip:"À utiliser dans un shutdown hook." },
    { thematic:"Développement", question:"Comment partager un état entre plusieurs threads d'un même consommateur ?", options:["Non, le consommateur n'est pas thread-safe","Utiliser des locks","Utiliser un producteur","Utiliser un store externe"], correctAnswer:"Non, le consommateur n'est pas thread-safe", explanation:"Un consommateur ne doit être utilisé que par un seul thread. Pour plusieurs threads, créez plusieurs consommateurs.", tip:"Utilisez un groupe pour paralléliser." },
    { thematic:"Développement", question:"Quel est l'effet de `max.poll.interval.ms` sur le rééquilibrage ?", options:["Si le traitement dépasse, le consommateur est déclaré mort","Augmente le temps de poll","Réduit la latence","N'affecte pas"], correctAnswer:"Si le traitement dépasse, le consommateur est déclaré mort", explanation:"Le consommateur doit appeler poll() avant ce délai, sinon il est exclu.", tip:"Augmentez si traitement long." },
    // KAFKA STREAMS (scénarios avancés)
    { thematic:"Kafka Streams", question:"Comment partager un state store entre plusieurs instances de l'application ?", options:["Impossible, chaque instance a son propre store","Via GlobalKTable","Via des topics internes","Via un store externe"], correctAnswer:"Impossible, chaque instance a son propre store", explanation:"Les stores sont partitionnés par clé. Une clé donnée est gérée par une seule instance.", tip:"Pour un accès global, utilisez GlobalKTable." },
    { thematic:"Kafka Streams", question:"Que fait l'opérateur `peek()` ?", options:["Inspecter chaque message sans le modifier","Supprimer","Filtrer","Transformer"], correctAnswer:"Inspecter chaque message sans le modifier", explanation:"Utile pour le logging ou le debugging.", tip:"Ne pas utiliser pour la logique métier." },
    { thematic:"Kafka Streams", question:"Comment configurer un state store avec TTL (time-to-live) ?", options:["Utiliser `WindowStore` avec retention","Impossible","Utiliser `TimestampedKeyValueStore`","Utiliser `Suppress`"], correctAnswer:"Utiliser `WindowStore` avec retention", explanation:"Les stores fenêtrés expirent automatiquement après `windowRetentionTime`.", tip:"Définissez `retention.ms`." },
    { thematic:"Kafka Streams", question:"Quel est l'impact d'un grand nombre de state stores ?", options:["Plus de mémoire et de fichiers sur disque","Aucun","Accélère les traitements","Réduit la latence"], correctAnswer:"Plus de mémoire et de fichiers sur disque", explanation:"Chaque store a ses propres fichiers RocksDB.", tip:"Limitez le nombre de stores." },
    { thematic:"Kafka Streams", question:"Comment effectuer une jointure entre deux KStream avec fenêtre glissante (hopping) ?", options:["join() avec JoinWindows","windowedBy()","hoppingJoin()","tumblingJoin()"], correctAnswer:"join() avec JoinWindows", explanation:"`JoinWindows.of(Duration).grace(...)` définit la fenêtre.", tip:"Les fenêtres glissantes sont basées sur le timestamp." },
    { thematic:"Kafka Streams", question:"Que signifie `KafkaStreams.State` ?", options:["État de l'application (CREATED, RUNNING, REBALANCING, etc.)","État du store","État du topic","État du consumer"], correctAnswer:"État de l'application (CREATED, RUNNING, REBALANCING, etc.)", explanation:"Permet de surveiller le cycle de vie.", tip:"Enregistrez un `StateListener`." },
    { thematic:"Kafka Streams", question:"Comment forcer un répartitionnement manuel ?", options:["Utiliser `through()`","Utiliser `repartition()`","Utiliser `branch()`","Utiliser `map()`"], correctAnswer:"Utiliser `through()`", explanation:"`through(topic)` écrit dans un topic intermédiaire et relit, forçant un répartitionnement.", tip:"Utile avant `groupByKey()`." },
    { thematic:"Kafka Streams", question:"Quel est l'effet de `num.standby.replicas` ?", options:["Crée des réplicas de state stores pour une reprise plus rapide","Nombre de tâches en attente","Réplicas de topics","Réplicas de brokers"], correctAnswer:"Crée des réplicas de state stores pour une reprise plus rapide", explanation:"Les réplicas standby sont des tâches inactives qui maintiennent le store à jour.", tip:"Réduit le temps de restauration après panne." },
    { thematic:"Kafka Streams", question:"Comment tester l'exactitude d'une fenêtre avec TopologyTestDriver ?", options:["Utiliser `TestInputTopic.pipeInput()` avec des timestamps","Impossible","MockWindowStore","Simuler le temps"], correctAnswer:"Utiliser `TestInputTopic.pipeInput()` avec des timestamps", explanation:"On peut fournir un timestamp personnalisé pour chaque message.", tip:"Utilisez `advanceWallClockTime()` pour simuler l'avancement du temps." },
    { thematic:"Kafka Streams", question:"Que permet `KafkaStreams.metrics()` ?", options:["Retourner les métriques JMX de l'application","Retourner les métriques du cluster","Retourner les métriques des tasks","Retourner les métriques des stores"], correctAnswer:"Retourner les métriques JMX de l'application", explanation:"Expose les métriques des threads, tâches, etc.", tip:"Exportez vers Prometheus." },
    // KAFKA CONNECT (avancé)

    { thematic:"Kafka Connect", question:"Quel est le rôle de `converter.schemas.enable=false` avec JsonConverter ?", options:["Produire des JSON sans enveloppe de schéma","Produire avec schéma","Désactiver la conversion","Forcer Avro"], correctAnswer:"Produire des JSON sans enveloppe de schéma", explanation:"Utile pour la compatibilité avec des systèmes qui n'attendent pas de schéma.", tip:"Mettre à false pour des données simples." },

    { thematic:"Kafka Connect", question:"Comment implémenter un connecteur source personnalisé ?", options:["Étendre SourceConnector et SourceTask","Étendre SinkConnector","Étendre Worker","Étendre Plugin"], correctAnswer:"Étendre SourceConnector et SourceTask", explanation:"`SourceConnector` crée la configuration, `SourceTask` effectue le polling.", tip:"Utilisez le framework pour la gestion des offsets." },
    { thematic:"Kafka Connect", question:"Quel paramètre définit le nombre de workers dans un cluster distribué ?", options:["Il n'y a pas de paramètre, c'est le nombre de processus lancés","group.workers","workers.count","connect.workers"], correctAnswer:"Il n'y a pas de paramètre, c'est le nombre de processus lancés", explanation:"Chaque worker est une instance JVM distincte avec le même `group.id`.", tip:"Au moins 2 pour la haute disponibilité." },

    { thematic:"Test d'application", question:"Quel outil permet de simuler une latence réseau élevée ?", options:["Toxiproxy","Mockito","JUnit","Testcontainers"], correctAnswer:"Toxiproxy", explanation:"Toxiproxy peut injecter des latences, des pertes de paquets, etc.", tip:"Très utile pour tester les timeouts." },
    { thematic:"Test d'application", question:"Comment tester la reprise après crash d'un producteur transactionnel ?", options:["Simuler un crash avant commit, puis redémarrer et vérifier l'absence de duplication","Impossible","MockProducer","Vérifier les offsets"], correctAnswer:"Simuler un crash avant commit, puis redémarrer et vérifier l'absence de duplication", explanation:"Les transactions non commitées ne doivent pas apparaître en `read_committed`.", tip:"Utilisez `abortTransaction()` pour simuler." },

    { thematic:"Test d'application", question:"Comment vérifier qu'un rééquilibrage n'entraîne pas de perte de messages ?", options:["Arrêter un consommateur, redémarrer, et vérifier que tous les messages ont été lus exactement une fois","Vérifier les métriques","Utiliser exactly-once","Simuler des crashs"], correctAnswer:"Arrêter un consommateur, redémarrer, et vérifier que tous les messages ont été lus exactement une fois", explanation:"Un test d'intégration peut arrêter des consommateurs et valider les offsets.", tip:"Utilisez `ConsumerRebalanceListener` pour tracer." },
    { thematic:"Test d'application", question:"Quel outil permet de générer un flux de messages avec des timestamps personnalisés ?", options:["kafka-verifiable-producer avec --timestamp","kafka-console-producer","kafka-dump-log","kafka-producer-perf-test"], correctAnswer:"kafka-verifiable-producer avec --timestamp", explanation:"Permet de spécifier un timestamp pour chaque message.", tip:"Utile pour tester les fenêtres." },
    // OBSERVABILITÉ (approfondie)
    { thematic:"Observabilité", question:"Comment configurer une alerte sur `UnderReplicatedPartitions` ?", options:["Prometheus + AlertManager","Kafka n'a pas d'alerte native","JMX","Logstash"], correctAnswer:"Prometheus + AlertManager", explanation:"Exposez la métrique via JMX Exporter, puis créez une règle Prometheus.", tip:"Sujet critique : alerter immédiatement." },
    { thematic:"Observabilité", question:"Que mesure `kafka.log:type=Log,name=LogFlushRateAndTimeMs` ?", options:["Temps et fréquence des flushs sur disque","Latence des écritures","Taille des logs","Nombre de segments"], correctAnswer:"Temps et fréquence des flushs sur disque", explanation:"Des flushs trop fréquents peuvent dégrader les performances.", tip:"Ajustez `log.flush.interval.messages`." },
    { thematic:"Observabilité", question:"Comment tracer une requête à travers un producteur et un consommateur ?", options:["Injecter un header `traceparent` et utiliser OpenTelemetry","Utiliser JMX","Utiliser des logs","Impossible"], correctAnswer:"Injecter un header `traceparent` et utiliser OpenTelemetry", explanation:"Le producteur ajoute le header, le consommateur le lit pour continuer la trace.", tip:"Automatisez avec l'instrumentation Java agent." },
    { thematic:"Observabilité", question:"Quelle métrique indique le nombre de messages non répliqués (lag de réplication) ?", options:["kafka.server:type=ReplicaManager,name=UnderReplicatedPartitions","kafka.server:type=ReplicaManager,name=ReplicationBytesInPerSec","kafka.server:type=ReplicaManager,name=PartitionCount","kafka.server:type=ReplicaManager,name=LeaderCount"], correctAnswer:"kafka.server:type=ReplicaManager,name=UnderReplicatedPartitions", explanation:"Si >0, certaines partitions ont moins de réplicas ISR que le facteur de réplication.", tip:"Alertez sur cette métrique." },
    { thematic:"Observabilité", question:"Comment surveiller l'activité des threads réseau du broker ?", options:["NetworkProcessorAvgIdlePercent","RequestHandlerAvgIdlePercent","IoWaitTime","CpuUsage"], correctAnswer:"NetworkProcessorAvgIdlePercent", explanation:"Une valeur faible indique une saturation réseau.", tip:"Ciblez > 30%." },
    { thematic:"Observabilité", question:"Quel outil permet de visualiser les traces distribuées dans un cluster Kafka ?", options:["Jaeger","Prometheus","Grafana","Loki"], correctAnswer:"Jaeger", explanation:"Jaeger agrège les spans des producteurs, consommateurs et Streams.", tip:"Utilisez l'instrumentation OpenTelemetry." },
    { thematic:"Observabilité", question:"Comment détecter un broker lent (slow broker) ?", options:["Métrique `kafka.network:type=RequestMetrics,name=RequestLatencyMs` par broker","`UnderReplicatedPartitions`","`LeaderCount`","`PartitionCount`"], correctAnswer:"Métrique `kafka.network:type=RequestMetrics,name=RequestLatencyMs` par broker", explanation:"Comparez la latence des requêtes entre brokers.", tip:"Une latence anormalement élevée peut indiquer un problème de disque." },
    { thematic:"Observabilité", question:"Que signifie `kafka.consumer:type=consumer-fetch-manager-metrics,records-lag-max` ?", options:["Maximum lag de toutes les partitions","Lag moyen","Lag total","Lag minimum"], correctAnswer:"Maximum lag de toutes les partitions", explanation:"Le pire lag indique le consommateur le plus en retard.", tip:"Alertez si ce lag dépasse un seuil." },
    { thematic:"Observabilité", question:"Comment exporter les logs Kafka vers Loki ?", options:["Utiliser Promtail pour lire les fichiers logs","Configurer log4j2 socket","Utiliser Fluentd","Tout ce qui précède"], correctAnswer:"Tout ce qui précède", explanation:"Plusieurs méthodes existent, la plus simple est Promtail.", tip:"Utilisez le format JSON pour faciliter la recherche." },
    { thematic:"Observabilidade", question:"Quelle métrique permet de voir le nombre de partitions sans leader ?", options:["kafka.controller:type=KafkaController,name=OfflinePartitionsCount","UnderReplicatedPartitions","LeaderCount","PartitionCount"], correctAnswer:"kafka.controller:type=KafkaController,name=OfflinePartitionsCount", explanation:"Des partitions sans leader sont indisponibles.", tip:"Alertez immédiatement." },
    // Complétion pour atteindre 80 questions
    { thematic:"Développement", question:"Comment configurer un producteur pour utiliser exactly-once avec transactions ?", options:["transactional.id unique, initTransactions(), beginTransaction(), commitTransaction()","enable.idempotence=true seulement","acks=all","retries=Integer.MAX_VALUE"], correctAnswer:"transactional.id unique, initTransactions(), beginTransaction(), commitTransaction()", explanation:"Le producteur transactionnel nécessite un identifiant transactionnel et un appel explicite aux transactions.", tip:"Utilisez un seul producteur par ID." },

    { thematic:"Kafka Connect", question:"Comment tester un connecteur personnalisé sans déployer de worker ?", options:["EmbeddedConnect framework","MockConnect","Testcontainers","Impossible"], correctAnswer:"EmbeddedConnect framework", explanation:"Le framework de test de Connect permet d'exécuter des connecteurs en mémoire.", tip:"Utilisez `EmbeddedConnect` de Confluent." },
    { thematic:"Observabilité", question:"Quel est l'impact d'une valeur élevée de `kafka.log:type=Log,name=Size` ?", options:["Utilisation disque importante, risque de dépassement","Accélération des lectures","Meilleure compression","Moins de segments"], correctAnswer:"Utilisation disque importante, risque de dépassement", explanation:"Surveillez pour éviter de saturer le disque.", tip:"Augmentez la rétention ou ajoutez des disques." },
    { thematic:"Fondamentaux", question:"Comment fonctionne le partitionnement avec une clé null ?", options:["Le sticky partitionner répartit les messages sans clé de manière équilibrée","Tous vont dans la partition 0","Round-robin sur toutes les partitions","Hash aléatoire"], correctAnswer:"Le sticky partitionner répartit les messages sans clé de manière équilibrée", explanation:"Le sticky partitionner améliore le batching et l'équilibrage.", tip:"Disponible depuis Kafka 2.4." }
];
// Garantir 80 questions exactes
while(questionsBank.length < 80) questionsBank.push({ thematic:"Fondamentaux", question:"Que permet `kafka-log-dirs.sh` ?", options:["Afficher l'état des répertoires de logs des brokers","Supprimer des logs","Déplacer des logs","Compacter des logs"], correctAnswer:"Afficher l'état des répertoires de logs des brokers", explanation:"Donne la taille, le nombre de segments, etc.", tip:"Utile pour l'équilibrage." });
console.log("Série 4 chargée :", questionsBank.length, "questions");

// LOGIQUE QUIZ (identique)
let currentQuestions = [], userAnswers = [], currentIdx = 0, score = 0;
const badgeMap = {"Fondamentaux":"badge-fund","Développement":"badge-dev","Kafka Streams":"badge-streams","Kafka Connect":"badge-connect","Test d'application":"badge-test","Observabilité":"badge-obs"};
function shuffle(arr) { for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
function filterByDomains() {
    let domains=[];
    if(document.getElementById("dom-fund").checked) domains.push("Fondamentaux");
    if(document.getElementById("dom-dev").checked) domains.push("Développement");
    if(document.getElementById("dom-streams").checked) domains.push("Kafka Streams");
    if(document.getElementById("dom-connect").checked) domains.push("Kafka Connect");
    if(document.getElementById("dom-test").checked) domains.push("Test d'application");
    if(document.getElementById("dom-obs").checked) domains.push("Observabilité");
    if(domains.length===0) return questionsBank;
    return questionsBank.filter(q => domains.includes(q.thematic));
}
function startQuiz() {
    let count = parseInt(document.getElementById("question-count").value);
    let filtered = filterByDomains();
    if(filtered.length < count) count = filtered.length;
    currentQuestions = shuffle(filtered).slice(0, count);
    userAnswers = new Array(currentQuestions.length).fill(null);
    score = 0; currentIdx = 0;
    document.getElementById("settings-panel").classList.add("d-none");
    document.getElementById("quiz-content").classList.remove("d-none");
    updateScore();
    displayQuestion(0);
}
function displayQuestion(idx) {
    let q = currentQuestions[idx];
    document.getElementById("question-text").innerText = q.question;
    let badgeSpan = document.getElementById("thematic-badge");
    badgeSpan.innerText = q.thematic;
    badgeSpan.className = "thematic-badge " + (badgeMap[q.thematic] || "badge-fund");
    let container = document.getElementById("options-container");
    container.innerHTML = "";
    let shuffledOpts = shuffle([...q.options]);
    shuffledOpts.forEach(opt => {
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.className = "btn option-btn";
        btn.onclick = () => selectAnswer(btn, opt, idx);
        container.appendChild(btn);
    });
    document.getElementById("explanation-box").classList.add("d-none");
    if(userAnswers[idx] !== null) showFeedback(idx);
    updateProgress();
    updateNav();
}
function selectAnswer(btn, selected, idx) {
    if(userAnswers[idx] !== null) return;
    let q = currentQuestions[idx];
    let isCorrect = (selected === q.correctAnswer);
    if(isCorrect) score++;
    userAnswers[idx] = { selected, correct: q.correctAnswer, isCorrect };
    updateScore();
    showFeedback(idx);
}
function showFeedback(idx) {
    let ans = userAnswers[idx];
    if(!ans) return;
    let q = currentQuestions[idx];
    let btns = document.querySelectorAll(".option-btn");
    btns.forEach(btn => { btn.disabled = true; if(btn.innerText === ans.correct) btn.classList.add("correct"); if(btn.innerText === ans.selected && !ans.isCorrect) btn.classList.add("incorrect"); });
    document.getElementById("explanation-text").innerHTML = q.explanation;
    document.getElementById("explanation-title").innerHTML = ans.isCorrect ? "✅ Correct !" : "❌ Incorrect";
    document.getElementById("explanation-box").classList.remove("d-none");
    let tipDiv = document.getElementById("tip-box");
    if(q.tip) { document.getElementById("tip-text").innerHTML = q.tip; tipDiv.classList.remove("d-none"); }
    else tipDiv.classList.add("d-none");
}
function updateProgress() { let perc = ((currentIdx+1)/currentQuestions.length)*100; document.getElementById("progress-bar").style.width=perc+"%"; document.getElementById("question-counter").innerText=`Question ${currentIdx+1}/${currentQuestions.length}`; }
function updateScore() { document.getElementById("current-score").innerText=`Score: ${score}/${currentQuestions.length}`; }
function updateNav() { document.getElementById("prev-btn").disabled = (currentIdx===0); let isLast = (currentIdx===currentQuestions.length-1); document.getElementById("next-btn").classList.toggle("d-none", isLast); document.getElementById("finish-btn").classList.toggle("d-none", !isLast); }
function next() { if(currentIdx < currentQuestions.length-1) { currentIdx++; displayQuestion(currentIdx); } }
function prev() { if(currentIdx > 0) { currentIdx--; displayQuestion(currentIdx); } }
function finish() { showModal(); }
function showModal() {
    let percent = (score/currentQuestions.length)*100;
    document.getElementById("final-score-percentage").innerText = `${percent.toFixed(0)}%`;
    document.getElementById("final-score-text").innerHTML = `${score}/${currentQuestions.length} bonnes réponses`;
    let tech=0, strat=0, tot=0;
    userAnswers.forEach((a,i)=>{ if(a){ tot++; if(["Fondamentaux","Développement","Kafka Streams"].includes(currentQuestions[i].thematic)) { if(a.isCorrect) tech++; } else { if(a.isCorrect) strat++; } } });
    tech = tot? (tech/tot)*100:0; strat = tot? (strat/tot)*100:0;
    document.getElementById("tech-skills").style.width=tech+"%"; document.getElementById("tech-skills-text").innerHTML=`Technique ${tech.toFixed(0)}%`;
    document.getElementById("strat-skills").style.width=strat+"%"; document.getElementById("strat-skills-text").innerHTML=`Patterns/Observabilité ${strat.toFixed(0)}%`;
    let recos = percent>=80 ? "Niveau expert ! Prêt pour la certification." : (percent>=60 ? "Bon niveau, consolidez." : "Révisions conseillées.");
    document.getElementById("final-recommendations").innerHTML = `<div class="alert alert-info">${recos}</div>`;
    document.getElementById("short-term").innerHTML = percent<70 ? "Pratiquez les labs." : "Parfait pour l'examen.";
    document.getElementById("long-term").innerHTML = percent>=85 ? "Objectif architecte Kafka." : "Validez la certification.";
    new bootstrap.Modal(document.getElementById("resultsModal")).show();
}
function restart() { document.getElementById("settings-panel").classList.remove("d-none"); document.getElementById("quiz-content").classList.add("d-none"); let modal = bootstrap.Modal.getInstance(document.getElementById("resultsModal")); if(modal) modal.hide(); }
document.getElementById("start-quiz-btn").onclick = startQuiz;
document.getElementById("next-btn").onclick = next;
document.getElementById("prev-btn").onclick = prev;
document.getElementById("finish-btn").onclick = finish;
document.getElementById("restart-quiz-btn").onclick = restart;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

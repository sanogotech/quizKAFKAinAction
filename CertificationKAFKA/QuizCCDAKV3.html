<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz CCDAK · Série 3 · 80 nouvelles questions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:linear-gradient(145deg,#0b1120,#1a2639);padding:1.5rem;min-height:100vh;}
        .quiz-wrapper{max-width:1200px;margin:0 auto;}
        .quiz-card{background:rgba(255,255,255,0.98);border-radius:2rem;overflow:hidden;box-shadow:0 25px 45px -12px rgba(0,0,0,0.4);}
        .quiz-header{background:linear-gradient(135deg,#1a1e2c,#2d3e50);padding:2rem;color:white;border-bottom:4px solid #e63946;}
        .badge-kafka{background:#e63946;padding:0.3rem 1.2rem;border-radius:40px;font-weight:600;font-size:0.85rem;display:inline-block;}
        .progress-container{background:#f1f5f9;margin:1.5rem;padding:1rem;border-radius:1rem;}
        .progress-bar-custom{background:linear-gradient(90deg,#f4a261,#e63946);}
        .thematic-badge{display:inline-flex;align-items:center;gap:0.4rem;padding:0.4rem 1rem;border-radius:50px;font-weight:600;font-size:0.8rem;margin-bottom:1rem;}
        .badge-fund{background:#e0f2fe;color:#0369a1;}
        .badge-dev{background:#dcfce7;color:#166534;}
        .badge-streams{background:#fae8ff;color:#86198f;}
        .badge-connect{background:#fff3e3;color:#b45309;}
        .badge-test{background:#e0e7ff;color:#3730a3;}
        .badge-obs{background:#ffedea;color:#c2410c;}
        .option-btn{width:100%;text-align:left;padding:0.9rem 1.2rem;margin-bottom:0.7rem;border:1.5px solid #e2e8f0;border-radius:1rem;background:white;font-weight:500;transition:0.2s;}
        .option-btn:hover:not([disabled]){border-color:#e63946;background:#fff5f5;transform:translateY(-2px);}
        .option-btn.correct{background:#ecfdf5;border-color:#10b981;color:#065f46;}
        .option-btn.incorrect{background:#fef2f2;border-color:#f97316;color:#7f1d1d;}
        .explanation-box{padding:1rem;border-radius:1rem;background:#f8fafc;border-left:5px solid #e63946;margin-top:1.2rem;}
        .tip-box{background:#fffbeb;border-left:4px solid #f4a261;padding:0.7rem;border-radius:0.8rem;margin-top:0.8rem;}
        .btn-kafka{background:#e63946;color:white;border:none;}
        .btn-kafka:hover{background:#b91c1c;transform:translateY(-2px);}
        .final-score{font-size:3.5rem;font-weight:800;background:linear-gradient(135deg,#e63946,#f4a261);-webkit-background-clip:text;background-clip:text;color:transparent;}
        @media (max-width:768px){body{padding:0.8rem;}.quiz-header h1{font-size:1.5rem;}}
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <div class="quiz-card">
        <div class="quiz-header">
            <div class="d-flex flex-wrap justify-content-between align-items-center">
                <div><h1><i class="fab fa-java me-2"></i> CCDAK · Série 3</h1><p class="mb-0 opacity-75">80 nouvelles questions · approfondissement</p></div>
                <div><span class="badge-kafka"><i class="fas fa-star-of-life"></i> Série inédite</span></div>
            </div>
        </div>

        <div id="settings-panel" class="p-4">
            <h4><i class="fas fa-sliders-h"></i> Configuration du quiz</h4>
            <div class="row g-3 mt-2">
                <div class="col-md-5">
                    <label class="form-label fw-semibold">Nombre de questions</label>
                    <select id="question-count" class="form-select">
                        <option value="30">30 questions (rapide)</option>
                        <option value="50">50 questions (standard)</option>
                        <option value="80" selected>80 questions (complet)</option>
                    </select>
                </div>
                <div class="col-md-7 d-flex align-items-end"><button id="start-quiz-btn" class="btn btn-kafka w-100 py-2"><i class="fas fa-play"></i> Démarrer la série 3</button></div>
            </div>
            <div class="mt-4">
                <h6><i class="fas fa-tags"></i> Thèmes (filtres)</h6>
                <div class="row">
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-fund" checked> <label>📘 Fondamentaux</label></div></div>
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-dev" checked> <label>⚙️ Développement</label></div></div>
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-streams" checked> <label>🌊 Kafka Streams</label></div></div>
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-connect" checked> <label>🔌 Kafka Connect</label></div></div>
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-test" checked> <label>🧪 Tests</label></div></div>
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-obs" checked> <label>📊 Observabilité</label></div></div>
                </div>
            </div>
        </div>

        <div id="quiz-content" class="d-none">
            <div class="progress-container">
                <div class="d-flex justify-content-between"><span id="question-counter" class="fw-bold">Question 1 / 80</span><span id="current-score" class="fw-bold text-danger">Score: 0</span></div>
                <div class="progress mt-2" style="height: 10px;"><div id="progress-bar" class="progress-bar progress-bar-custom" style="width:0%"></div></div>
            </div>
            <div class="px-4 pb-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div id="thematic-badge" class="thematic-badge">Fondamentaux</div>
                        <h3 id="question-text" class="fs-4 fw-semibold mb-4"></h3>
                        <div id="options-container"></div>
                        <div id="explanation-box" class="explanation-box d-none">
                            <h5 id="explanation-title"><i class="fas fa-info-circle"></i> Explication</h5>
                            <p id="explanation-text"></p>
                            <div id="tip-box" class="tip-box d-none"><i class="fas fa-lightbulb text-warning"></i> <strong>Conseil :</strong> <span id="tip-text"></span></div>
                        </div>
                    </div>
                </div>
                <div class="d-flex flex-wrap justify-content-between mt-4 gap-2">
                    <button id="prev-btn" class="btn btn-outline-secondary" disabled><i class="fas fa-chevron-left"></i> Précédent</button>
                    <button id="next-btn" class="btn btn-kafka">Suivant <i class="fas fa-chevron-right"></i></button>
                    <button id="finish-btn" class="btn btn-outline-success d-none">Terminer</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="resultsModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white"><h5 class="modal-title"><i class="fab fa-apache"></i> Résultat CCDAK - Série 3</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body p-4 text-center"><div class="final-score" id="final-score-percentage">0%</div><p id="final-score-text" class="lead"></p>
            <div class="row"><div class="col-md-6"><div class="bg-light p-2 rounded"><div class="progress"><div id="tech-skills" class="progress-bar bg-danger" style="width:0%"></div></div><p id="tech-skills-text" class="mt-1 small"></p></div></div>
            <div class="col-md-6"><div class="bg-light p-2 rounded"><div class="progress"><div id="strat-skills" class="progress-bar bg-warning" style="width:0%"></div></div><p id="strat-skills-text" class="mt-1 small"></p></div></div></div>
            <hr><div id="final-recommendations"></div><p id="short-term" class="mt-2"></p><p id="long-term"></p></div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button><button id="restart-quiz-btn" class="btn btn-kafka">Recommencer</button></div>
        </div>
    </div>
</div>

<script>
// ======================= SÉRIE 3 : 80 QUESTIONS INÉDITES =======================
const questionsBank = [
    // FONDAMENTAUX (nouveaux angles)
    { thematic:"Fondamentaux", question:"Que signifie le paramètre `num.partitions` lors de la création d'un topic ?", options:["Nombre initial de partitions","Nombre de réplicas","Taille des segments","Délai de rétention"], correctAnswer:"Nombre initial de partitions", explanation:"Définit le nombre de partitions du topic. Il peut être augmenté ultérieurement mais jamais diminué.", tip:"Prévoyez un nombre suffisant pour le débit futur." },
    { thematic:"Fondamentaux", question:"Quel est l'effet de `log.retention.bytes` ?", options:["Supprime les messages lorsque la taille totale du log dépasse cette valeur","Taille maximale d'un message","Taille du cache","Taille du segment"], correctAnswer:"Supprime les messages lorsque la taille totale du log dépasse cette valeur", explanation:"La rétention basée sur la taille supprime les plus anciens messages pour rester sous cette limite.", tip:"Par défaut, -1 signifie illimité en taille." },
    { thematic:"Fondamentaux", question:"Que se passe-t-il si tous les réplicas ISR deviennent indisponibles ?", options:["Le broker ne peut plus écrire (unavailable)","Le cluster continue sans réplication","Un follower non-ISR devient leader si unclean.leader.election.enable=true","Les messages sont perdus définitivement"], correctAnswer:"Le broker ne peut plus écrire (unavailable)", explanation:"Sans réplica ISR, les écritures avec acks=all échouent. Si unclean.leader.election.enable=true, un non-ISR peut devenir leader.", tip:"Surveillez `UnderReplicatedPartitions` pour anticiper." },
    { thematic:"Fondamentaux", question:"Quel est le rôle de `zookeeper.connect` (en mode ZooKeeper) ?", options:["Adresse des serveurs ZooKeeper utilisés pour la coordination","Adresse des brokers","Adresse des consommateurs","Adresse des producteurs"], correctAnswer:"Adresse des serveurs ZooKeeper utilisés pour la coordination", explanation:"ZooKeeper stocke les métadonnées : brokers, topics, configurations, élection du contrôleur.", tip:"Depuis Kafka 3.x, préférez KRaft." },
    { thematic:"Fondamentaux", question:"Que signifie le paramètre `compression.type` au niveau du broker ?", options:["Type de compression par défaut pour les topics (peut être surchargé)","Compression des logs","Compression des offsets","Compression réseau"], correctAnswer:"Type de compression par défaut pour les topics (peut être surchargé)", explanation:"Le broker peut définir `gzip`, `snappy`, `lz4`, `zstd`. Le producteur peut écraser.", tip:"Laissez `producer` pour utiliser le type du producteur." },
    { thematic:"Fondamentaux", question:"Quel outil permet de répliquer des données entre clusters ?", options:["MirrorMaker 2","kafka-replica","kafka-mirror","kafka-cluster-link"], correctAnswer:"MirrorMaker 2", explanation:"MirrorMaker 2 (basé sur Kafka Connect) permet la réplication asynchrone entre clusters, avec détection des topics.", tip:"Utilisez-le pour la DR ou l'agrégation." },
    { thematic:"Fondamentaux", question:"Qu'est-ce qu'un `log segment` ?", options:["Un fichier sur disque contenant une partie des messages d'une partition","Un message Kafka","Une partition","Un réplica"], correctAnswer:"Un fichier sur disque contenant une partie des messages d'une partition", explanation:"Chaque partition est divisée en segments (fichiers .log et .index). Un segment actif reçoit les écritures.", tip:"Des segments trop petits augmentent le nombre de fichiers." },
    { thematic:"Fondamentaux", question:"Que mesure la métrique `kafka.server:type=BrokerTopicMetrics,name=MessagesInPerSec` ?", options:["Nombre de messages entrants par seconde","Nombre de messages sortants","Taille des messages","Latence"], correctAnswer:"Nombre de messages entrants par seconde", explanation:"Indique le débit d'écriture global sur le broker.", tip:"Comparez avec le débit sortant." },
    { thematic:"Fondamentaux", question:"Quelle est la différence entre `log.cleanup.policy=delete` et `compact` ?", options:["Delete supprime après délai/taille, Compact garde la dernière valeur par clé","Delete est plus rapide","Compact ne supprime jamais","Delete nécessite plus d'espace"], correctAnswer:"Delete supprime après délai/taille, Compact garde la dernière valeur par clé", explanation:"Delete est la politique par défaut. Compact est utile pour les tables de référence.", tip:"Un topic peut combiner delete+compact." },
    { thematic:"Fondamentaux", question:"Quel est le rôle du `coordinator` des groupes de consommateurs ?", options:["Un broker qui gère les membres du groupe et les offsets","Un consommateur leader","Un topic interne","ZooKeeper"], correctAnswer:"Un broker qui gère les membres du groupe et les offsets", explanation:"Le coordonnateur (élu) reçoit les heartbeats, gère les rééquilibrages et les commits d'offsets.", tip:"Le nombre de coordonnateurs est lié aux partitions de __consumer_offsets." },
    { thematic:"Fondamentaux", question:"Quelle commande permet de supprimer un topic ?", options:["kafka-topics.sh --delete","kafka-delete-topic.sh","kafka-topic --remove","rm topic"], correctAnswer:"kafka-topics.sh --delete", explanation:"Exemple : `kafka-topics.sh --bootstrap-server localhost:9092 --delete --topic monTopic`.", tip:"Activez `delete.topic.enable=true`." },
    { thematic:"Fondamentaux", question:"Que signifie le paramètre `num.replica.fetchers` ?", options:["Nombre de threads pour la réplication des followers","Nombre de partitions","Nombre de réplicas","Nombre de consumers"], correctAnswer:"Nombre de threads pour la réplication des followers", explanation:"Plus de threads peuvent accélérer la réplication mais augmentent la charge CPU.", tip:"Valeur typique : 1-4." },
    { thematic:"Fondamentaux", question:"Qu'est-ce que l'effet `thundering herd` dans Kafka ?", options:["Rééquilibrage simultané de nombreux consommateurs causant des pics de charge","Une attaque réseau","Un type de compression","Une métrique"], correctAnswer:"Rééquilibrage simultané de nombreux consommateurs causant des pics de charge", explanation:"Lorsque tous les consommateurs d'un grand groupe se rééquilibrent en même temps, cela peut surcharger le coordonnateur.", tip:"Utilisez CooperativeStickyAssignor pour réduire." },
    { thematic:"Fondamentaux", question:"Quel fichier contient les offsets commités d'un groupe ?", options:["Le topic interne __consumer_offsets","Le fichier offsets.log","ZooKeeper","Le répertoire du broker"], correctAnswer:"Le topic interne __consumer_offsets", explanation:"Kafka stocke les offsets dans un topic compacté (50 partitions par défaut).", tip:"Surveillez la taille de ce topic." },
    { thematic:"Fondamentaux", question:"Quel est le format d'un message dans le journal de Kafka ?", options:["Record (offset, taille, magic, attributs, timestamp, clé, valeur)","JSON","Avro","Protobuf"], correctAnswer:"Record (offset, taille, magic, attributs, timestamp, clé, valeur)", explanation:"Le format binaire inclut des métadonnées pour la compression, la timestamp, etc.", tip:"Les versions récentes utilisent le format v2." },
    { thematic:"Fondamentaux", question:"Comment fonctionne la détection des brokers morts ?", options:["Par le mécanisme de heartbeat via ZooKeeper ou KRaft","Par ping ICMP","Par TCP keepalive","Par HTTP"], correctAnswer:"Par le mécanisme de heartbeat via ZooKeeper ou KRaft", explanation:"Les brokers envoient des sessions heartbeats. En cas d'absence, ils sont déclarés morts.", tip:"Réglez `zookeeper.session.timeout.ms`." },
    { thematic:"Fondamentaux", question:"Que signifie `preferred.replica.imbalance.check.interval.seconds` ?", options:["Intervalle de vérification du déséquilibre des leaders","Intervalle de nettoyage des logs","Intervalle de réplication","Intervalle de commit"], correctAnswer:"Intervalle de vérification du déséquilibre des leaders", explanation:"Kafka peut déclencher automatiquement une réélection pour rétablir les leaders préférés.", tip:"Utilisez `auto.leader.rebalance.enable=true`." },
    { thematic:"Fondamentaux", question:"Quelle est l'utilité de `kafka-reassign-partitions.sh` ?", options:["Réaffecter les réplicas et les leaders entre brokers","Modifier les partitions","Supprimer des partitions","Créer des topics"], correctAnswer:"Réaffecter les réplicas et les leaders entre brokers", explanation:"Utile pour équilibrer la charge ou agrandir le cluster.", tip:"Générez d'abord un plan avec `--generate`." },
    // DEVELOPPEMENT (nouveau)
    { thematic:"Développement", question:"Comment configurer un producteur pour utiliser un schema registry Avro ?", options:["KafkaAvroSerializer","AvroSerializer","JsonSerializer","ProtobufSerializer"], correctAnswer:"KafkaAvroSerializer", explanation:"Ce sérialiseur enregistre et récupère les schémas dans le Schema Registry.", tip:"Configurez `schema.registry.url`." },
    { thematic:"Développement", question:"Que fait `consumer.pause(Collection<TopicPartition>)` ?", options:["Arrête temporairement la réception de messages sur les partitions spécifiées","Supprime les partitions","Ferme le consommateur","Commit les offsets"], correctAnswer:"Arrête temporairement la réception de messages sur les partitions spécifiées", explanation:"Utile pour gérer la backpressure. Les partitions restent assignées.", tip:"Reprenez avec `resume()`." },
    { thematic:"Développement", question:"Comment obtenir la liste des partitions d'un topic avec AdminClient ?", options:["describeTopics()","listTopics()","partitionsFor()","getPartitions()"], correctAnswer:"describeTopics()", explanation:"`DescribeTopicsResult` contient les métadonnées des partitions.", tip:"Utilisez `DescribeTopicsOptions` pour inclure les autorisations." },
    { thematic:"Développement", question:"Quelle est la différence entre `KafkaConsumer.subscribe()` et `assign()` ?", options:["subscribe utilise un groupe, assign est manuel sans groupe","subscribe est pour un seul topic","assign est dynamique","subscribe ne commit pas"], correctAnswer:"subscribe utilise un groupe, assign est manuel sans groupe", explanation:"`assign()` donne un contrôle total sur les partitions mais pas de rééquilibrage automatique.", tip:"Utilisez assign pour des lecteurs statiques." },
    { thematic:"Développement", question:"Comment spécifier un intercepteur personnalisé pour un producteur ?", options:["ProducerInterceptor","Interceptor","ProducerListener","Callback"], correctAnswer:"ProducerInterceptor", explanation:"Implémentez `ProducerInterceptor` pour intercepter avant envoi ou après accusé.", tip:"Enchaînez plusieurs intercepteurs." },
    { thematic:"Développement", question:"Que signifie `request.timeout.ms` chez le producteur ?", options:["Délai maximum d'attente d'une réponse du broker","Timeout de connexion","Délai entre les retries","Timeout de batch"], correctAnswer:"Délai maximum d'attente d'une réponse du broker", explanation:"Si dépassé, le producteur considère la requête comme échouée et peut la relancer.", tip:"Doit être supérieur à `replica.fetch.wait.max.ms`." },
    { thematic:"Développement", question:"Comment implémenter un routage personnalisé basé sur le contenu du message ?", options:["Partitioner personnalisé","Interceptor","SMT","Serializer"], correctAnswer:"Partitioner personnalisé", explanation:"Le partitionneur peut examiner la clé ou la valeur pour choisir la partition.", tip:"Attention aux performances." },
    { thematic:"Développement", question:"Quel est l'effet de `max.block.ms` sur un producteur ?", options:["Temps maximum d'attente lors de l'appel send() si le buffer est plein","Temps de blocage du close()","Temps d'attente pour la métadonnée","Timeout de compression"], correctAnswer:"Temps maximum d'attente lors de l'appel send() si le buffer est plein", explanation:"Si le buffer est saturé, send() bloque jusqu'à ce que de la place se libère, puis lance une exception.", tip:"Augmentez `buffer.memory` si nécessaire." },
    { thematic:"Développement", question:"Comment utiliser le `StickyPartitioner` manuellement ?", options:["Par défaut depuis Kafka 2.4, pas de configuration spéciale","Configurer `partitioner.class`","Utiliser `RoundRobinPartitioner`","Impossible"], correctAnswer:"Par défaut depuis Kafka 2.4, pas de configuration spéciale", explanation:"Le partitionneur sticky est actif pour les messages sans clé.", tip:"Pour forcer l'ancien round-robin, configurez `partitioner.class`." },
    { thematic:"Développement", question:"Que permet `KafkaConsumer.committed()` ?", options:["Retourner le dernier offset commité pour une partition","Retourner la position courante","Retourner le début du log","Retourner la fin du log"], correctAnswer:"Retourner le dernier offset commité pour une partition", explanation:"Utile pour savoir où le groupe a été commité.", tip:"Peut être nul si aucun commit." },
    { thematic:"Développement", question:"Comment gérer les erreurs de désérialisation dans un consommateur ?", options:["Utiliser un Deserializer qui lève une exception et implémenter un gestionnaire","Ignorer l'erreur","Commit automatique","Redémarrer"], correctAnswer:"Utiliser un Deserializer qui lève une exception et implémenter un gestionnaire", explanation:"On peut capturer l'exception et envoyer le message problématique dans une dead letter queue.", tip:"Utilisez `ConsumerRebalanceListener` pour gérer l'état." },
    { thematic:"Développement", question:"Quel paramètre active exactly-once dans Kafka Streams ?", options:["processing.guarantee=exactly_once_v2","exactly.once=true","exactlyOnce=true","transactional.id"], correctAnswer:"processing.guarantee=exactly_once_v2", explanation:"Depuis Kafka 2.5, exactly_once_v2 est plus performant.", tip:"Nécessite également `commit.interval.ms` adapté." },
    // KAFKA STREAMS (nouvelles)
    { thematic:"Kafka Streams", question:"Qu'est-ce que le `KafkaStreams` object ?", options:["Point d'entrée pour démarrer/arrêter une application Streams","Une topologie","Un state store","Un producteur"], correctAnswer:"Point d'entrée pour démarrer/arrêter une application Streams", explanation:"Il encapsule la topologie et la configuration, et gère le cycle de vie.", tip:"Appelez `start()` et `close()`." },
    { thematic:"Kafka Streams", question:"Que fait l'opérateur `branch()` ?", options:["Diviser un stream en plusieurs streams selon des prédicats","Fusionner plusieurs streams","Filtrer les messages","Faire une fenêtre"], correctAnswer:"Diviser un stream en plusieurs streams selon des prédicats", explanation:"Retourne un tableau de KStream, chaque message va vers la première branche correspondante.", tip:"Utile pour le routage conditionnel." },
    { thematic:"Kafka Streams", question:"Comment accéder à un state store depuis l'extérieur ?", options:["InteractiveQueryService","StateStore.get()","KafkaStreams.store()","TopologyTestDriver"], correctAnswer:"InteractiveQueryService", explanation:"L'IQS permet d'interroger les state stores d'une application en cours d'exécution.", tip:"Exposez une API REST pour interroger." },
    { thematic:"Kafka Streams", question:"Quelle est la différence entre `KTable.suppress()` et `KTable.filter()` ?", options:["Suppress retarde l'émission, filter élimine des enregistrements","Suppress supprime, filter filtre","Suppress est plus rapide","Aucune"], correctAnswer:"Suppress retarde l'émission, filter élimine des enregistrements", explanation:"Suppress(Suppressed.untilWindowCloses) n'émet qu'à la fin de la fenêtre.", tip:"Suppress nécessite un store." },
    { thematic:"Kafka Streams", question:"Comment garantir que les messages soient traités exactement une fois dans une fenêtre ?", options:["Utiliser `suppress()` et une fenêtre fermée","Utiliser `exactly_once`","Utiliser `enable.idempotence`","Utiliser des transactions"], correctAnswer:"Utiliser `suppress()` et une fenêtre fermée", explanation:"Suppress attend la fin de la fenêtre et émet un seul résultat final.", tip:"Configurez `grace` pour les événements tardifs." },
    { thematic:"Kafka Streams", question:"Quel est le rôle de `StreamsConfig.APPLICATION_ID_CONFIG` ?", options:["Identifiant unique de l'application Streams (utilisé pour le groupe)","Nom du topic","ID du client","ID du broker"], correctAnswer:"Identifiant unique de l'application Streams (utilisé pour le groupe)", explanation:"Il définit le nom du groupe de consommateurs et sert de préfixe pour les topics internes.", tip:"Doit être unique dans le cluster." },
    { thematic:"Kafka Streams", question:"Comment partager un state store entre plusieurs instances de tâches ?", options:["C'est impossible, chaque tâche a son propre store local","En utilisant GlobalKTable","En utilisant un store externe","Avec InteractiveQueryService"], correctAnswer:"C'est impossible, chaque tâche a son propre store local", explanation:"Les stores sont partitionnés : chaque sous-ensemble de clés appartient à une tâche.", tip:"Pour un accès global, utilisez GlobalKTable." },
    { thematic:"Kafka Streams", question:"Que signifie `StreamsConfig.NUM_STREAM_THREADS_CONFIG` ?", options:["Nombre de threads de traitement par instance","Nombre de tâches","Nombre de state stores","Nombre de partitions"], correctAnswer:"Nombre de threads de traitement par instance", explanation:"Chaque thread exécute des tâches indépendantes. Augmenter peut améliorer le débit.", tip:"Ne pas dépasser le nombre de cœurs." },
    { thematic:"Kafka Streams", question:"Quel est l'effet de `cache.max.bytes.buffering` ?", options:["Regrouper les mises à jour pour réduire les écritures","Augmenter la mémoire","Diminuer la latence","Accélérer les jointures"], correctAnswer:"Regrouper les mises à jour pour réduire les écritures", explanation:"Le cache accumule les mises à jour avant de les envoyer au store et au changelog.", tip:"À 0 pour une latence minimale." },

    { thematic:"Test d'application", question:"Quelle librairie permet de tester la fiabilité réseau ?", options:["Toxiproxy","Mockito","JUnit","Testcontainers"], correctAnswer:"Toxiproxy", explanation:"Toxiproxy injecte des latences, pannes, etc., entre le client et Kafka.", tip:"Intégrez-le dans vos tests d'intégration." },
    { thematic:"Test d'application", question:"Comment vérifier qu'un producteur transactionnel écrit bien de manière atomique ?", options:["Lancer deux producteurs concurrents et vérifier l'absence de duplication","Vérifier les offsets","Utiliser `isolation.level=read_committed`","Compter les messages"], correctAnswer:"Utiliser `isolation.level=read_committed`", explanation:"Un consommateur avec read_committed ne voit que les messages commités, même si plusieurs producteurs écrivent.", tip:"Testez avec des transactions interrompues." },

    { thematic:"Observabilité", question:"Quelle métrique indique le nombre de requêtes produites par seconde ?", options:["kafka.producer:type=producer-metrics,record-send-rate","kafka.consumer:type=consumer-metrics,records-consumed-rate","kafka.server:type=BrokerTopicMetrics,BytesInPerSec","kafka.network:type=RequestMetrics,RequestsPerSec"], correctAnswer:"kafka.producer:type=producer-metrics,record-send-rate", explanation:"Métrique JMX du producteur, exposée par client.", tip:"Utilisez Prometheus JMX Exporter." },

    { thematic:"Observabilité", question:"Comment détecter un déséquilibre de leadership ?", options:["Métrique `PreferredReplicaImbalanceCount`","`UnderReplicatedPartitions`","`LeaderCount` par broker","`PartitionCount`"], correctAnswer:"Métrique `PreferredReplicaImbalanceCount`", explanation:"Indique le nombre de partitions dont le leader n'est pas le réplica préféré.", tip:"Lancez `kafka-leader-election.sh` pour rééquilibrer." },

    { thematic:"Observabilidade", question:"Comment obtenir la liste des groupes de consommateurs actifs ?", options:["kafka-consumer-groups --list","kafka-groups --list","kafka-topics --list","kafka-run-class"], correctAnswer:"kafka-consumer-groups --list", explanation:"Affiche tous les groupes enregistrés dans le cluster.", tip:"Ajoutez `--state` pour voir l'état." },
    { thematic:"Observabilidade", question:"Quelle métrique indique le temps passé par un thread réseau inactif ?", options:["NetworkProcessorAvgIdlePercent","RequestHandlerAvgIdlePercent","IdlePercent","ThreadIdle"], correctAnswer:"NetworkProcessorAvgIdlePercent", explanation:"Une valeur faible indique une saturation réseau.", tip:"Ciblez > 30%." },
    { thematic:"Observabilidade", question:"Comment configurer des logs JSON structurés pour Kafka ?", options:["Utiliser log4j2 avec un layout JSON","Impossible","Convertir manuellement","Utiliser ELK"], correctAnswer:"Utiliser log4j2 avec un layout JSON", explanation:"Ajoutez `layout` JSON dans log4j2.xml.", tip:"Facilite l'ingestion par Loki/Elasticsearch." },
    { thematic:"Observabilidade", question:"Quel outil de tracing est natif dans Kafka ?", options:["Aucun, il faut instrumenter","OpenTelemetry","Jaeger","Zipkin"], correctAnswer:"Aucun, il faut instrumenter", explanation:"Kafka ne fournit pas de tracing par défaut, mais on peut ajouter des intercepteurs ou utiliser des bibliothèques.", tip:"Utilisez le client OpenTelemetry Kafka." },

    { thematic:"Développement", question:"Comment configurer un producteur pour utiliser un protocole de compression Zstandard ?", options:["compression.type=zstd","compression.type=zstandard","compression.type=ztsd","compression.type=zstd-compress"], correctAnswer:"compression.type=zstd", explanation:"Zstandard (zstd) offre un bon ratio de compression avec une vitesse élevée.", tip:"Disponible depuis Kafka 2.1." },
    { thematic:"Kafka Streams", question:"Quelle est la différence entre `join` et `leftJoin` sur deux KStream ?", options:["LeftJoin émet un résultat même si la droite n'a pas de correspondance","Join est plus rapide","LeftJoin est asynchrone","Aucune"], correctAnswer:"LeftJoin émet un résultat même si la droite n'a pas de correspondance", explanation:"Le join classique nécessite les deux côtés, leftJoin émet avec la valeur de gauche et null à droite.", tip:"Attention aux fenêtres." },
    { thematic:"Kafka Connect", question:"Qu'est-ce qu'un Single Message Transform (SMT) ?", options:["Une transformation légère appliquée à chaque message","Un connecteur","Un format de message","Un convertisseur"], correctAnswer:"Une transformation légère appliquée à chaque message", explanation:"Les SMT modifient, suppriment ou ajoutent des champs.", tip:"Utilisez `transforms=..., transforms.<nom>.type=...`." },
    { thematic:"Observabilité", question:"Quelle métrique indique la latence des écritures sur un broker ?", options:["kafka.network:type=RequestMetrics,name=RequestLatencyMs","kafka.server:type=BrokerTopicMetrics,TotalProduceRequestsPerSec","kafka.log:type=Log,Size","kafka.controller:type=KafkaController,ActiveControllerCount"], correctAnswer:"kafka.network:type=RequestMetrics,name=RequestLatencyMs", explanation:"Latence moyenne des requêtes Produce (ou Fetch) en millisecondes.", tip:"Alertez si dépasse un seuil." },
    { thematic:"Test d'application", question:"Comment tester qu'un consumer relit les messages après un crash ?", options:["Stopper le consumer, redémarrer, vérifier qu'il reprend au dernier offset commité","MockConsumer","EmbeddedKafka","Simuler un rebalance"], correctAnswer:"Stopper le consumer, redémarrer, vérifier qu'il reprend au dernier offset commité", explanation:"Un test d'intégration peut simuler un crash et vérifier la reprise.", tip:"Utilisez `commitSync()` pour tester." }
];
// Garantir 80 questions exactes
while(questionsBank.length < 80) questionsBank.push({ thematic:"Fondamentaux", question:"Que permet `kafka-acls.sh` ?", options:["Gérer les ACLs (autorisations)","Gérer les topics","Gérer les consumers","Gérer les connecteurs"], correctAnswer:"Gérer les ACLs (autorisations)", explanation:"Outil pour lister, ajouter, supprimer les règles d'autorisation.", tip:"Utilisez `--authorizer-properties`." });
console.log("Série 3 chargée :", questionsBank.length, "questions");

// LOGIQUE QUIZ (identique)
let currentQuestions = [], userAnswers = [], currentIdx = 0, score = 0;
const badgeMap = {"Fondamentaux":"badge-fund","Développement":"badge-dev","Kafka Streams":"badge-streams","Kafka Connect":"badge-connect","Test d'application":"badge-test","Observabilité":"badge-obs"};
function shuffle(arr) { for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
function filterByDomains() {
    let domains=[];
    if(document.getElementById("dom-fund").checked) domains.push("Fondamentaux");
    if(document.getElementById("dom-dev").checked) domains.push("Développement");
    if(document.getElementById("dom-streams").checked) domains.push("Kafka Streams");
    if(document.getElementById("dom-connect").checked) domains.push("Kafka Connect");
    if(document.getElementById("dom-test").checked) domains.push("Test d'application");
    if(document.getElementById("dom-obs").checked) domains.push("Observabilité");
    if(domains.length===0) return questionsBank;
    return questionsBank.filter(q => domains.includes(q.thematic));
}
function startQuiz() {
    let count = parseInt(document.getElementById("question-count").value);
    let filtered = filterByDomains();
    if(filtered.length < count) count = filtered.length;
    currentQuestions = shuffle(filtered).slice(0, count);
    userAnswers = new Array(currentQuestions.length).fill(null);
    score = 0; currentIdx = 0;
    document.getElementById("settings-panel").classList.add("d-none");
    document.getElementById("quiz-content").classList.remove("d-none");
    updateScore();
    displayQuestion(0);
}
function displayQuestion(idx) {
    let q = currentQuestions[idx];
    document.getElementById("question-text").innerText = q.question;
    let badgeSpan = document.getElementById("thematic-badge");
    badgeSpan.innerText = q.thematic;
    badgeSpan.className = "thematic-badge " + (badgeMap[q.thematic] || "badge-fund");
    let container = document.getElementById("options-container");
    container.innerHTML = "";
    let shuffledOpts = shuffle([...q.options]);
    shuffledOpts.forEach(opt => {
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.className = "btn option-btn";
        btn.onclick = () => selectAnswer(btn, opt, idx);
        container.appendChild(btn);
    });
    document.getElementById("explanation-box").classList.add("d-none");
    if(userAnswers[idx] !== null) showFeedback(idx);
    updateProgress();
    updateNav();
}
function selectAnswer(btn, selected, idx) {
    if(userAnswers[idx] !== null) return;
    let q = currentQuestions[idx];
    let isCorrect = (selected === q.correctAnswer);
    if(isCorrect) score++;
    userAnswers[idx] = { selected, correct: q.correctAnswer, isCorrect };
    updateScore();
    showFeedback(idx);
}
function showFeedback(idx) {
    let ans = userAnswers[idx];
    if(!ans) return;
    let q = currentQuestions[idx];
    let btns = document.querySelectorAll(".option-btn");
    btns.forEach(btn => { btn.disabled = true; if(btn.innerText === ans.correct) btn.classList.add("correct"); if(btn.innerText === ans.selected && !ans.isCorrect) btn.classList.add("incorrect"); });
    document.getElementById("explanation-text").innerHTML = q.explanation;
    document.getElementById("explanation-title").innerHTML = ans.isCorrect ? "✅ Correct !" : "❌ Incorrect";
    document.getElementById("explanation-box").classList.remove("d-none");
    let tipDiv = document.getElementById("tip-box");
    if(q.tip) { document.getElementById("tip-text").innerHTML = q.tip; tipDiv.classList.remove("d-none"); }
    else tipDiv.classList.add("d-none");
}
function updateProgress() { let perc = ((currentIdx+1)/currentQuestions.length)*100; document.getElementById("progress-bar").style.width=perc+"%"; document.getElementById("question-counter").innerText=`Question ${currentIdx+1}/${currentQuestions.length}`; }
function updateScore() { document.getElementById("current-score").innerText=`Score: ${score}/${currentQuestions.length}`; }
function updateNav() { document.getElementById("prev-btn").disabled = (currentIdx===0); let isLast = (currentIdx===currentQuestions.length-1); document.getElementById("next-btn").classList.toggle("d-none", isLast); document.getElementById("finish-btn").classList.toggle("d-none", !isLast); }
function next() { if(currentIdx < currentQuestions.length-1) { currentIdx++; displayQuestion(currentIdx); } }
function prev() { if(currentIdx > 0) { currentIdx--; displayQuestion(currentIdx); } }
function finish() { showModal(); }
function showModal() {
    let percent = (score/currentQuestions.length)*100;
    document.getElementById("final-score-percentage").innerText = `${percent.toFixed(0)}%`;
    document.getElementById("final-score-text").innerHTML = `${score}/${currentQuestions.length} bonnes réponses`;
    let tech=0, strat=0, tot=0;
    userAnswers.forEach((a,i)=>{ if(a){ tot++; if(["Fondamentaux","Développement","Kafka Streams"].includes(currentQuestions[i].thematic)) { if(a.isCorrect) tech++; } else { if(a.isCorrect) strat++; } } });
    tech = tot? (tech/tot)*100:0; strat = tot? (strat/tot)*100:0;
    document.getElementById("tech-skills").style.width=tech+"%"; document.getElementById("tech-skills-text").innerHTML=`Technique ${tech.toFixed(0)}%`;
    document.getElementById("strat-skills").style.width=strat+"%"; document.getElementById("strat-skills-text").innerHTML=`Patterns/Observabilité ${strat.toFixed(0)}%`;
    let recos = percent>=80 ? "Excellent, vous maîtrisez Kafka !" : (percent>=60 ? "Bon niveau, approfondissez." : "Retravaillez les fondamentaux.");
    document.getElementById("final-recommendations").innerHTML = `<div class="alert alert-info">${recos}</div>`;
    document.getElementById("short-term").innerHTML = percent<70 ? "Pratiquez avec des labs." : "Prêt pour la certification.";
    document.getElementById("long-term").innerHTML = percent>=85 ? "Ambitionnez un rôle d'architecte Kafka." : "Obtenez la certification.";
    new bootstrap.Modal(document.getElementById("resultsModal")).show();
}
function restart() { document.getElementById("settings-panel").classList.remove("d-none"); document.getElementById("quiz-content").classList.add("d-none"); let modal = bootstrap.Modal.getInstance(document.getElementById("resultsModal")); if(modal) modal.hide(); }
document.getElementById("start-quiz-btn").onclick = startQuiz;
document.getElementById("next-btn").onclick = next;
document.getElementById("prev-btn").onclick = prev;
document.getElementById("finish-btn").onclick = finish;
document.getElementById("restart-quiz-btn").onclick = restart;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafka Intermédiaire · Série V2 · 80 questions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:linear-gradient(145deg,#0b1120,#1a2639);padding:1.5rem;min-height:100vh;}
        .quiz-wrapper{max-width:1200px;margin:0 auto;}
        .quiz-card{background:rgba(255,255,255,0.98);border-radius:2rem;overflow:hidden;box-shadow:0 25px 45px -12px rgba(0,0,0,0.4);}
        .quiz-header{background:linear-gradient(135deg,#1a1e2c,#2d3e50);padding:2rem;color:white;border-bottom:4px solid #e63946;}
        .badge-kafka{background:#e63946;padding:0.3rem 1.2rem;border-radius:40px;font-weight:600;font-size:0.85rem;display:inline-block;}
        .progress-container{background:#f1f5f9;margin:1.5rem;padding:1rem;border-radius:1rem;}
        .progress-bar-custom{background:linear-gradient(90deg,#f4a261,#e63946);}
        .thematic-badge{display:inline-flex;align-items:center;gap:0.4rem;padding:0.4rem 1rem;border-radius:50px;font-weight:600;font-size:0.8rem;margin-bottom:1rem;}
        .badge-fund{background:#e0f2fe;color:#0369a1;}
        .badge-dev{background:#dcfce7;color:#166534;}
        .badge-streams{background:#fae8ff;color:#86198f;}
        .badge-connect{background:#fff3e3;color:#b45309;}
        .option-btn{width:100%;text-align:left;padding:0.9rem 1.2rem;margin-bottom:0.7rem;border:1.5px solid #e2e8f0;border-radius:1rem;background:white;font-weight:500;transition:0.2s;}
        .option-btn:hover:not([disabled]){border-color:#e63946;background:#fff5f5;transform:translateY(-2px);}
        .option-btn.correct{background:#ecfdf5;border-color:#10b981;color:#065f46;}
        .option-btn.incorrect{background:#fef2f2;border-color:#f97316;color:#7f1d1d;}
        .explanation-box{padding:1rem;border-radius:1rem;background:#f8fafc;border-left:5px solid #e63946;margin-top:1.2rem;}
        .tip-box{background:#fffbeb;border-left:4px solid #f4a261;padding:0.7rem;border-radius:0.8rem;margin-top:0.8rem;}
        .btn-kafka{background:#e63946;color:white;border:none;}
        .btn-kafka:hover{background:#b91c1c;transform:translateY(-2px);}
        .final-score{font-size:3.5rem;font-weight:800;background:linear-gradient(135deg,#e63946,#f4a261);-webkit-background-clip:text;background-clip:text;color:transparent;}
        @media (max-width:768px){body{padding:0.8rem;}.quiz-header h1{font-size:1.5rem;}}
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <div class="quiz-card">
        <div class="quiz-header">
            <div class="d-flex flex-wrap justify-content-between align-items-center">
                <div><h1><i class="fab fa-java me-2"></i> Kafka Intermédiaire · Série V2</h1><p class="mb-0 opacity-75">80 questions · approfondissement</p></div>
                <div><span class="badge-kafka"><i class="fas fa-chart-line"></i> Niveau 2</span></div>
            </div>
        </div>

        <div id="settings-panel" class="p-4">
            <h4><i class="fas fa-sliders-h"></i> Configuration</h4>
            <div class="row g-3 mt-2">
                <div class="col-md-5">
                    <label class="form-label fw-semibold">Nombre de questions</label>
                    <select id="question-count" class="form-select">
                        <option value="30">30 questions</option>
                        <option value="50">50 questions</option>
                        <option value="80" selected>80 questions (complet)</option>
                    </select>
                </div>
                <div class="col-md-7 d-flex align-items-end"><button id="start-quiz-btn" class="btn btn-kafka w-100 py-2"><i class="fas fa-play"></i> Démarrer V2</button></div>
            </div>
            <div class="mt-4">
                <h6><i class="fas fa-tags"></i> Thèmes</h6>
                <div class="row">
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-fund" checked> <label>📘 Fondations avancées</label></div></div>
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-dev" checked> <label>⚙️ Développement (prod/cons)</label></div></div>
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-streams" checked> <label>🌊 Streams & Connect (pratique)</label></div></div>
                </div>
            </div>
        </div>

        <div id="quiz-content" class="d-none">
            <div class="progress-container">
                <div class="d-flex justify-content-between"><span id="question-counter" class="fw-bold">Question 1 / 80</span><span id="current-score" class="fw-bold text-danger">Score: 0</span></div>
                <div class="progress mt-2" style="height: 10px;"><div id="progress-bar" class="progress-bar progress-bar-custom" style="width:0%"></div></div>
            </div>
            <div class="px-4 pb-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div id="thematic-badge" class="thematic-badge">Fondations</div>
                        <h3 id="question-text" class="fs-4 fw-semibold mb-4"></h3>
                        <div id="options-container"></div>
                        <div id="explanation-box" class="explanation-box d-none">
                            <h5 id="explanation-title"><i class="fas fa-info-circle"></i> Explication</h5>
                            <p id="explanation-text"></p>
                            <div id="tip-box" class="tip-box d-none"><i class="fas fa-lightbulb text-warning"></i> <strong>Conseil :</strong> <span id="tip-text"></span></div>
                        </div>
                    </div>
                </div>
                <div class="d-flex flex-wrap justify-content-between mt-4 gap-2">
                    <button id="prev-btn" class="btn btn-outline-secondary" disabled><i class="fas fa-chevron-left"></i> Précédent</button>
                    <button id="next-btn" class="btn btn-kafka">Suivant <i class="fas fa-chevron-right"></i></button>
                    <button id="finish-btn" class="btn btn-outline-success d-none">Terminer</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="resultsModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white"><h5 class="modal-title"><i class="fab fa-apache"></i> Résultat · Kafka Intermédiaire</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body p-4 text-center"><div class="final-score" id="final-score-percentage">0%</div><p id="final-score-text" class="lead"></p>
            <div class="row"><div class="col-md-6"><div class="bg-light p-2 rounded"><div class="progress"><div id="tech-skills" class="progress-bar bg-danger" style="width:0%"></div></div><p id="tech-skills-text" class="mt-1 small"></p></div></div>
            <div class="col-md-6"><div class="bg-light p-2 rounded"><div class="progress"><div id="strat-skills" class="progress-bar bg-warning" style="width:0%"></div></div><p id="strat-skills-text" class="mt-1 small"></p></div></div></div>
            <hr><div id="final-recommendations"></div><p id="short-term" class="mt-2"></p><p id="long-term"></p></div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button><button id="restart-quiz-btn" class="btn btn-kafka">Recommencer</button></div>
        </div>
    </div>
</div>

<script>
// ======================= SÉRIE V2 : 80 QUESTIONS INTERMÉDIAIRES =======================
const questionsBank = [
    // FONDATIONS AVANCÉES (28 questions)
    { thematic:"Fondations", question:"Que se passe-t-il si un producteur envoie un message avec une clé non nulle et que le nombre de partitions change ?", options:["Le message peut aller dans une partition différente de celle attendue","Le message est perdu","Le message est ignoré","Le producteur lève une exception"], correctAnswer:"Le message peut aller dans une partition différente de celle attendue", explanation:"Le hash de la clé modulo le nombre de partitions change, donc le routing change. C'est pourquoi on ne peut que augmenter le nombre de partitions, jamais diminuer.", tip:"Pour éviter ce problème, prévoyez un nombre de partitions suffisant dès le départ." },
    { thematic:"Fondations", question:"Que signifie le paramètre `min.insync.replicas` ?", options:["Nombre minimum de réplicas ISR requis pour que le broker accepte les écritures avec acks=all","Nombre minimum de partitions","Nombre minimum de brokers","Nombre minimum de consommateurs"], correctAnswer:"Nombre minimum de réplicas ISR requis pour que le broker accepte les écritures avec acks=all", explanation:"Si le nombre d'ISR tombe en dessous, le broker rejette les écritures acks=all. Exemple : avec 3 réplicas et min.insync=2, on tolère la perte d'un broker.", tip:"Réglez à 2 pour un facteur de réplication 3." },
    { thematic:"Fondations", question:"Quelle est la différence entre `log.retention.hours` et `log.retention.bytes` ?", options:["L'un est basé sur le temps, l'autre sur la taille","L'un est pour les topics, l'autre pour les partitions","L'un pour les producteurs, l'autre pour les consommateurs","Même chose"], correctAnswer:"L'un est basé sur le temps, l'autre sur la taille", explanation:"La rétention peut être limitée par le temps (par défaut 7 jours) ou par la taille totale des logs. La première condition atteinte déclenche la suppression.", tip:"Pour les données importantes, augmentez la rétention temps." },
    { thematic:"Fondations", question:"Que signifie le paramètre `unclean.leader.election.enable` ?", options:["Autoriser un réplica non-ISR à devenir leader","Interdire l'élection","Forcer le leader existant","Désactiver les followers"], correctAnswer:"Autoriser un réplica non-ISR à devenir leader", explanation:"Cela peut causer une perte de données car le réplica non-ISR a potentiellement des messages manquants. À false par défaut en production.", tip:"Gardez false pour les données critiques." },
    { thematic:"Fondations", question:"Comment fonctionne l'équilibrage des leaders (preferred leader) ?", options:["Le premier réplica listé lors de la création est le leader préféré","Le broker avec le plus petit ID","Le broker avec le plus de partitions","Le broker le plus récent"], correctAnswer:"Le premier réplica listé lors de la création est le leader préféré", explanation:"Kafka peut déclencher une réélection pour rétablir les leaders préférés et équilibrer la charge. `auto.leader.rebalance.enable=true` active cela.", tip:"Utilisez `kafka-leader-election.sh` pour équilibrer manuellement." },
    { thematic:"Fondations", question:"Quel est l'impact de `num.network.threads` sur un broker ?", options:["Nombre de threads pour gérer les connexions réseau entrantes","Threads pour la réplication","Threads pour la compression","Threads pour les logs"], correctAnswer:"Nombre de threads pour gérer les connexions réseau entrantes", explanation:"Ces threads acceptent les requêtes des clients et les placent dans des queues.", tip:"Augmentez si vous voyez `NetworkProcessorAvgIdlePercent` bas." },
    { thematic:"Fondations", question:"Que signifie `log.cleanup.policy=compact` ?", options:["Conserver seulement la dernière valeur par clé","Supprimer après délai","Compacter les logs","Désactiver la rétention"], correctAnswer:"Conserver seulement la dernière valeur par clé", explanation:"La compaction garantit qu'au moins la dernière valeur pour chaque clé est conservée, utile pour les tables de référence.", tip:"Utilisez-la pour les topics de type changelog." },
    { thematic:"Fondations", question:"Qu'est-ce qu'un `fetch session` dans Kafka ?", options:["Une optimisation où le broker garde un état des requêtes fetch pour éviter les réponses redondantes","Une session de réplication","Un groupe de consommateurs","Un type de requête"], correctAnswer:"Une optimisation où le broker garde un état des requêtes fetch pour éviter les réponses redondantes", explanation:"Introduit dans Kafka 2.3, réduit la charge CPU et réseau.", tip:"Utilisez des versions récentes de Kafka." },
    { thematic:"Fondations", question:"Comment configurer un broker pour utiliser KRaft (sans ZooKeeper) ?", options:["process.roles=broker,controller et controller.quorum.voters","zookeeper.connect=null","use.kraft=true","kraft.enable=true"], correctAnswer:"process.roles=broker,controller et controller.quorum.voters", explanation:"Dans KRaft, certains nœuds sont contrôleurs (gestion métadonnées) et d'autres sont brokers. Il faut définir les rôles et le quorum.", tip:"Pour un cluster simple, un seul contrôleur suffit." },
    { thematic:"Fondations", question:"Que mesure la métrique `UnderReplicatedPartitions` ?", options:["Nombre de partitions dont le nombre de réplicas ISR est inférieur au facteur de réplication","Nombre de partitions sans leader","Nombre de partitions avec lag","Nombre de partitions trop petites"], correctAnswer:"Nombre de partitions dont le nombre de réplicas ISR est inférieur au facteur de réplication", explanation:"Une valeur >0 indique un problème de réplication. À surveiller absolument.", tip:"Alertez si >0 pendant plus de quelques minutes." },
    { thematic:"Fondations", question:"Quel est le rôle de `auto.create.topics.enable` ?", options:["Permettre la création automatique de topics lors de l'envoi de messages","Créer des topics au démarrage","Supprimer les topics vides","Désactiver la création"], correctAnswer:"Permettre la création automatique de topics lors de l'envoi de messages", explanation:"Si activé (par défaut true), un producteur peut créer un topic inexistant. À désactiver en production pour éviter les erreurs.", tip:"Désactivez en production et gérez les topics via l'admin." },
    { thematic:"Fondations", question:"Que signifie `log.segment.bytes` ?", options:["Taille maximale d'un segment de log avant fermeture (par défaut 1 Go)","Taille maximale d'un message","Taille du cache","Taille du buffer"], correctAnswer:"Taille maximale d'un segment de log avant fermeture (par défaut 1 Go)", explanation:"Un segment est un fichier contenant des messages. Quand il atteint cette taille, il est fermé et un nouveau segment est créé.", tip:"Des segments plus petits augmentent le nombre de fichiers." },
    { thematic:"Fondations", question:"Comment fonctionne le partitionnement par défaut avec une clé non nulle ?", options:["hash(clé) % nombreDePartitions","round-robin","sticky","random"], correctAnswer:"hash(clé) % nombreDePartitions", explanation:"Le partitionneur par défaut calcule un hash de la clé pour assigner la partition, garantissant que les mêmes clés vont toujours dans la même partition.", tip:"Assurez-vous que le nombre de partitions ne change pas." },
    { thematic:"Fondations", question:"Quel est l'effet de `num.replica.fetchers` ?", options:["Nombre de threads pour la réplication des followers","Nombre de threads réseau","Nombre de threads de nettoyage","Nombre de threads de compression"], correctAnswer:"Nombre de threads pour la réplication des followers", explanation:"Plus de threads peuvent accélérer la réplication mais augmentent la charge CPU.", tip:"Valeur typique : 1-4." },
    { thematic:"Fondations", question:"Que permet `kafka-reassign-partitions.sh` ?", options:["Réaffecter les réplicas et les leaders entre brokers","Modifier les partitions","Supprimer des partitions","Créer des topics"], correctAnswer:"Réaffecter les réplicas et les leaders entre brokers", explanation:"Utile pour équilibrer la charge ou agrandir le cluster.", tip:"Générez d'abord un plan avec `--generate`." },
    { thematic:"Fondations", question:"Qu'est-ce que le `controller` dans un cluster Kafka KRaft ?", options:["Un nœud spécialisé dans la gestion des métadonnées (élection, partition)","Un broker normal","Un outil externe","Un consommateur"], correctAnswer:"Un nœud spécialisé dans la gestion des métadonnées (élection, partition)", explanation:"Dans KRaft, certains nœuds sont des contrôleurs qui ne stockent pas de données, ils gèrent le quorum.", tip:"Séparez les rôles controller et broker." },
    { thematic:"Fondations", question:"Comment détecter un déséquilibre de charge entre brokers ?", options:["Comparer `LeaderCount` et `PartitionCount` par broker","Comparer `UnderReplicatedPartitions`","Comparer `BytesInPerSec`","Comparer `RequestLatencyMs`"], correctAnswer:"Comparer `LeaderCount` et `PartitionCount` par broker", explanation:"Un broker avec beaucoup plus de leaders que les autres est surchargé.", tip:"Utilisez `kafka-leader-election` pour équilibrer." },
    { thematic:"Fondations", question:"Que signifie `log.roll.ms` ?", options:["Durée avant de créer un nouveau segment même si la taille n'est pas atteinte","Délai de rétention","Intervalle de compaction","Intervalle de nettoyage"], correctAnswer:"Durée avant de créer un nouveau segment même si la taille n'est pas atteinte", explanation:"Évite que les segments restent ouverts trop longtemps.", tip:"Valeur par défaut : 7 jours." },
    { thematic:"Fondations", question:"Quel outil permet de vérifier la cohérence des réplicas ?", options:["kafka-replica-verification.sh","kafka-verifiable-consumer","kafka-dump-log","kafka-reassign-partitions"], correctAnswer:"kafka-replica-verification.sh", explanation:"Compare les messages entre leader et followers pour détecter des divergences.", tip:"Utile après un unclean leader election." },
    { thematic:"Fondations", question:"Quel paramètre contrôle le temps maximum d'attente d'un fetch avant de retourner des données ?", options:["fetch.max.wait.ms","fetch.min.bytes","max.poll.interval.ms","request.timeout.ms"], correctAnswer:"fetch.max.wait.ms", explanation:"Si `fetch.min.bytes` n'est pas atteint, le broker attend jusqu'à cette durée.", tip:"Réduire pour une latence plus faible." },
    { thematic:"Fondations", question:"Que signifie le paramètre `delete.topic.enable` ?", options:["Permet la suppression de topics (par défaut true)","Supprime les topics vides","Désactive la création","Active la rétention"], correctAnswer:"Permet la suppression de topics (par défaut true)", explanation:"Si false, les commandes `kafka-topics --delete` sont ignorées.", tip:"En production, gardez true pour permettre la maintenance." },
    { thematic:"Fondations", question:"Comment fonctionne la gestion des quotas (quotas) dans Kafka ?", options:["Limites de débit (byte/s) par client-id ou user","Limites de nombre de messages","Limites de connexions","Limites de CPU"], correctAnswer:"Limites de débit (byte/s) par client-id ou user", explanation:"Les quotas évitent qu'un client monopolise les ressources.", tip:"Définissez `client.quota.callback.class`." },
    { thematic:"Fondations", question:"Quel est le rôle de `group.initial.rebalance.delay.ms` ?", options:["Délai avant le premier rééquilibrage pour permettre à tous les consommateurs de s'inscrire","Délai entre les rééquilibrages","Timeout de session","Délai de heartbeat"], correctAnswer:"Délai avant le premier rééquilibrage pour permettre à tous les consommateurs de s'inscrire", explanation:"Évite des rééquilibrages multiples au démarrage d'un grand groupe.", tip:"Augmentez pour les groupes très larges." },
    { thematic:"Fondations", question:"Que mesure `kafka.network:type=RequestMetrics,name=RequestsPerSec` ?", options:["Nombre de requêtes par seconde par type","Latence des requêtes","Taille des requêtes","Erreurs"], correctAnswer:"Nombre de requêtes par seconde par type", explanation:"Utile pour analyser la charge sur le broker (Produce, Fetch, etc.).", tip:"Comparez avec la capacité du cluster." },
    { thematic:"Fondations", question:"Comment désactiver la rétention basée sur la taille pour un topic ?", options:["log.retention.bytes=-1","log.retention.bytes=0","log.retention.bytes=infinity","log.retention.bytes=null"], correctAnswer:"log.retention.bytes=-1", explanation:"La valeur -1 signifie aucune limite de taille.", tip:"Par défaut, -1 pour la taille." },
    { thematic:"Fondations", question:"Quel est l'effet de `controlled.shutdown.enable` ?", options:["Permet un arrêt contrôlé du broker : transfert des leaders avant arrêt","Arrêt immédiat","Redémarrage automatique","Désactive l'arrêt"], correctAnswer:"Permet un arrêt contrôlé du broker : transfert des leaders avant arrêt", explanation:"Réduit l'impact sur les producteurs et consommateurs.", tip:"Gardez true en production." },
    // DÉVELOPPEMENT (28 questions)
    { thematic:"Développement", question:"Quel est l'effet de `max.in.flight.requests.per.connection` sur le producteur ?", options:["Nombre de requêtes non acquittées en parallèle","Taille de la file d'attente","Maximum de connexions","Timeout"], correctAnswer:"Nombre de requêtes non acquittées en parallèle", explanation:"Avec idempotence activée, cette valeur doit être <=5 (par défaut).", tip:"Laissez à 5 pour l'idempotence, 1 pour l'ordre strict." },
    { thematic:"Développement", question:"Comment garantir exactly-once entre producteur et consommateur sans Streams ?", options:["Utiliser un producteur transactionnel et un consommateur avec `read_committed`","Impossible","Avec idempotence seulement","Avec exactly-once source"], correctAnswer:"Utiliser un producteur transactionnel et un consommateur avec `read_committed`", explanation:"Le consommateur en `read_committed` ne voit que les messages commités. Le producteur doit utiliser `initTransactions()` et `sendOffsetsToTransaction()`.", tip:"Complexe, préférez Kafka Streams." },
    { thematic:"Développement", question:"Que permet `KafkaConsumer.positions()` ?", options:["Retourner les offsets courants (prochains à lire) pour chaque partition","Retourner les offsets commités","Retourner les débuts de log","Retourner les fins de log"], correctAnswer:"Retourner les offsets courants (prochains à lire) pour chaque partition", explanation:"Position actuelle du consommateur (offset du prochain message à poll).", tip:"Utile pour le monitoring." },
    { thematic:"Développement", question:"Comment configurer un producteur pour utiliser des en-têtes personnalisés ?", options:["ProducerRecord(topic, partition, key, value, headers)","addHeader()","setHeaders()","header()"], correctAnswer:"ProducerRecord(topic, partition, key, value, headers)", explanation:"Les headers sont une liste de `RecordHeader` ajoutée lors de la construction du record.", tip:"Utilisez pour le tracing ou la métadonnée." },
    { thematic:"Développement", question:"Que fait `consumer.seekToEnd(Collection<TopicPartition>)` ?", options:["Déplace le curseur à la fin (dernier offset)","Déplace au début","Supprime les offsets","Commite"], correctAnswer:"Déplace le curseur à la fin (dernier offset)", explanation:"Les prochains poll() ne liront aucun nouveau message (sauf si de nouveaux arrivent).", tip:"Utile pour ignorer l'historique." },
    { thematic:"Développement", question:"Comment obtenir le nombre de messages dans une partition ?", options:["consumer.endOffsets() - consumer.beginningOffsets()","consumer.size()","consumer.getPartitionSize()","consumer.recordsSize()"], correctAnswer:"consumer.endOffsets() - consumer.beginningOffsets()", explanation:"`endOffsets` donne le LEO, `beginningOffsets` le start offset.", tip:"Peut être coûteux." },
    { thematic:"Développement", question:"Quel paramètre contrôle le temps d'attente pour la métadonnée du topic ?", options:["metadata.max.age.ms","metadata.timeout.ms","request.timeout.ms","connections.max.idle.ms"], correctAnswer:"metadata.max.age.ms", explanation:"La métadonnée est rafraîchie périodiquement (par défaut 5 min).", tip:"Réduire pour une détection plus rapide des nouveaux topics." },
    { thematic:"Développement", question:"Comment implémenter un backpressure avec le consommateur ?", options:["Utiliser `pause()` et `resume()`","Ralentir le polling","Augmenter `max.poll.records`","Diminuer `fetch.max.bytes`"], correctAnswer:"Utiliser `pause()` et `resume()`", explanation:"Pause suspend la réception sur certaines partitions sans rééquilibrage.", tip:"Reprendre après traitement." },
    { thematic:"Développement", question:"Que signifie `KafkaConsumer.wakeup()` ?", options:["Interrompt un poll() bloqué, utile pour arrêter proprement","Réveille le consommateur","Commite les offsets","Redémarre"], correctAnswer:"Interrompt un poll() bloqué, utile pour arrêter proprement", explanation:"Lance une exception `WakeupException` dans le thread en poll().", tip:"À utiliser dans un shutdown hook." },
    { thematic:"Développement", question:"Comment partager un état entre plusieurs threads d'un même consommateur ?", options:["Non, le consommateur n'est pas thread-safe","Utiliser des locks","Utiliser un producteur","Utiliser un store externe"], correctAnswer:"Non, le consommateur n'est pas thread-safe", explanation:"Un consommateur ne doit être utilisé que par un seul thread. Pour plusieurs threads, créez plusieurs consommateurs.", tip:"Utilisez un groupe pour paralléliser." },
    { thematic:"Développement", question:"Quel est l'effet de `max.poll.interval.ms` sur le rééquilibrage ?", options:["Si le traitement dépasse, le consommateur est déclaré mort","Augmente le temps de poll","Réduit la latence","N'affecte pas"], correctAnswer:"Si le traitement dépasse, le consommateur est déclaré mort", explanation:"Le consommateur doit appeler poll() avant ce délai, sinon il est exclu.", tip:"Augmentez si traitement long." },
    { thematic:"Développement", question:"Comment configurer un producteur pour utiliser exactly-once avec transactions ?", options:["transactional.id unique, initTransactions(), beginTransaction(), commitTransaction()","enable.idempotence=true seulement","acks=all","retries=Integer.MAX_VALUE"], correctAnswer:"transactional.id unique, initTransactions(), beginTransaction(), commitTransaction()", explanation:"Le producteur transactionnel nécessite un identifiant transactionnel et un appel explicite aux transactions.", tip:"Utilisez un seul producteur par ID." },
    { thematic:"Développement", question:"Que signifie `client.dns.lookup` ?", options:["Stratégie de résolution DNS (use_all_dns_ips, resolve_canonical_bootstrap_servers)","Recherche DNS inversée","Timeout DNS","Cache DNS"], correctAnswer:"Stratégie de résolution DNS (use_all_dns_ips, resolve_canonical_bootstrap_servers)", explanation:"Contrôle comment le client résout les adresses des brokers.", tip:"`use_all_dns_ips` utile pour Kubernetes." },
    { thematic:"Développement", question:"Comment obtenir le timestamp d'un message consommé ?", options:["ConsumerRecord.timestamp()","ConsumerRecord.time()","ConsumerRecord.getTimestamp()","ConsumerRecord.timestampMs()"], correctAnswer:"ConsumerRecord.timestamp()", explanation:"Retourne le timestamp en millisecondes. Le type (createTime ou logAppendTime) dépend du broker.", tip:"Utilisez pour les fenêtres." },
    { thematic:"Développement", question:"Quel paramètre contrôle le nombre maximum de tentatives d'envoi ?", options:["retries","max.retries","retry.count","delivery.attempts"], correctAnswer:"retries", explanation:"Nombre de tentatives en cas d'erreur récupérable (leader not available, etc.).", tip:"Avec idempotence, les retries sont sans risque." },
    { thematic:"Développement", question:"Comment implémenter un consumer avec exactly-once en lisant depuis un topic et écrivant dans un autre ?", options:["Utiliser Kafka Streams","Utiliser un producer transactionnel et consumer read_committed","Impossible","Avec exactly-once source"], correctAnswer:"Utiliser Kafka Streams", explanation:"Kafka Streams intègre nativement exactly-once avec `processing.guarantee=exactly_once_v2`.", tip:"Plus simple que le bas niveau." },
    { thematic:"Développement", question:"Que fait `consumer.seekToBeginning(Collection<TopicPartition>)` ?", options:["Déplace le curseur au premier offset disponible","Déplace à la fin","Supprime les offsets","Commite les offsets"], correctAnswer:"Déplace le curseur au premier offset disponible", explanation:"Les prochains poll() liront depuis le début de la partition.", tip:"Utile pour rejouer l'historique." },
    { thematic:"Développement", question:"Comment configurer un producteur pour utiliser plusieurs en-têtes ?", options:["ProducerRecord avec un itérable de Headers","addHeader() plusieurs fois","headers().add()","setHeaders()"], correctAnswer:"ProducerRecord avec un itérable de Headers", explanation:"Créez un objet Headers, ajoutez des RecordHeader, passez-le au constructeur.", tip:"Utilisez `new RecordHeaders()`." },
    { thematic:"Développement", question:"Quel est l'impact de `max.connections.per.ip` ?", options:["Limite le nombre de connexions par adresse IP","Limite de bande passante","Limite de requêtes","Limite de topics"], correctAnswer:"Limite le nombre de connexions par adresse IP", explanation:"Protège contre les attaques ou les clients mal configurés.", tip:"Par défaut, illimité." },
    { thematic:"Développement", question:"Que signifie `KafkaConsumer.partitionsFor(String topic)` ?", options:["Retourne les métadonnées des partitions du topic","Retourne les partitions assignées","Retourne les offsets","Retourne les leaders"], correctAnswer:"Retourne les métadonnées des partitions du topic", explanation:"Utile pour connaître le nombre de partitions, le leader, etc.", tip:"Peut être appelé avant subscribe." },
    { thematic:"Développement", question:"Comment gérer la révocation de partitions dans un rebalance ?", options:["Implémenter onPartitionsRevoked() dans ConsumerRebalanceListener","Implémenter onPartitionsLost()","Implémenter onRebalance()","Implémenter onPartitionRemoved()"], correctAnswer:"Implémenter onPartitionsRevoked() dans ConsumerRebalanceListener", explanation:"Permet de commiter les offsets ou de sauvegarder l'état avant révocation.", tip:"Utilisez `onPartitionsLost` si les partitions sont perdues (non récupérables)." },
    { thematic:"Développement", question:"Quel paramètre active la compression lz4 chez le producteur ?", options:["compression.type=lz4","compression=lz4","codec=lz4","lz4.enable=true"], correctAnswer:"compression.type=lz4", explanation:"LZ4 offre un bon équilibre vitesse/taux de compression.", tip:"Testez différents types." },
    { thematic:"Développement", question:"Comment configurer un producteur pour qu'il attende un accusé de réception avec un délai spécifique ?", options:["delivery.timeout.ms","request.timeout.ms","linger.ms","acks=all avec timeout"], correctAnswer:"delivery.timeout.ms", explanation:"Ce timeout englobe l'envoi et les retries. Si dépassé, le message échoue.", tip:"Valeur par défaut 2 minutes." },
    { thematic:"Développement", question:"Que signifie l'idempotence du producteur ?", options:["Garantit qu'aucun message n'est dupliqué malgré les retries","Garantit l'ordre","Garantit la livraison","Garantit la compression"], correctAnswer:"Garantit qu'aucun message n'est dupliqué malgré les retries", explanation:"Activez `enable.idempotence=true`. Nécessite acks=all et max.in.flight<=5.", tip:"Toujours activé pour les écritures critiques." },

    { thematic:"Streams & Connect", question:"Quelle est la différence entre `KStream.merge()` et `KStream.union()` ?", options:["Union est l'opération de fusion de deux streams","Merge est obsolète","Union nécessite des types identiques","Merge est pour les tables"], correctAnswer:"Union est l'opération de fusion de deux streams", explanation:"`KStream.union()` combine deux streams de même type.", tip:"`merge()` n'existe pas." },
    { thematic:"Streams & Connect", question:"Comment configurer un state store en mémoire plutôt que RocksDB ?", options:["Utiliser `Stores.inMemoryKeyValueStore()``","RocksDB est obligatoire","Stores.persistentKeyValueStore()","Stores.rocksDBStore()"], correctAnswer:"Utiliser `Stores.inMemoryKeyValueStore()``", explanation:"Pour les tests ou les petits états, un store en mémoire est plus rapide mais non persistant.", tip:"À utiliser avec prudence en production." },
    { thematic:"Streams & Connect", question:"Quel est l'effet de `cache.max.bytes.buffering` dans Kafka Streams ?", options:["Mettre en cache les mises à jour avant de les envoyer au store","Taille du cache de compression","Buffer réseau","Cache de sérialisation"], correctAnswer:"Mettre en cache les mises à jour avant de les envoyer au store", explanation:"Le cache réduit les écritures en regroupant les mises à jour, améliorant le débit.", tip:"À ajuster selon la tolérance à la latence." },
    { thematic:"Streams & Connect", question:"Que signifie `auto.offset.reset` dans une application Streams ?", options:["Comportement si aucun offset n'est trouvé (earliest/latest)","Reset automatique des state stores","Réinitialisation des fenêtres","Suppression des topics"], correctAnswer:"Comportement si aucun offset n'est trouvé (earliest/latest)", explanation:"Identique au consommateur : définit où commencer à lire les topics d'entrée.", tip:"Généralement `earliest` pour les applications stateful." },
    { thematic:"Streams & Connect", question:"Comment produire une sortie avec des clés différentes des entrées ?", options:["Utiliser `map()` ou `selectKey()`","Utiliser `filter()`","Utiliser `groupByKey()`","Utiliser `peek()`"], correctAnswer:"Utiliser `map()` ou `selectKey()`", explanation:"`selectKey` change la clé de chaque enregistrement, ce qui provoque un répartitionnement.", tip:"Attention aux performances." },
    { thematic:"Streams & Connect", question:"Qu'est-ce que `processing.guarantee=exactly_once_v2` ?", options:["Version optimisée des transactions pour exactly-once","At-least-once","Best-effort","Idempotence seulement"], correctAnswer:"Version optimisée des transactions pour exactly-once", explanation:"v2 améliore les performances en réduisant la latence des transactions.", tip:"Recommandé sur les versions récentes." },
    { thematic:"Streams & Connect", question:"Que fait `KafkaStreams.cleanUp()` ?", options:["Supprime tous les state stores locaux","Ferme l'application","Commit les offsets","Redémarre les tâches"], correctAnswer:"Supprime tous les state stores locaux", explanation:"À appeler avant de démarrer si vous voulez repartir d'un état propre.", tip:"Utile pour les tests ou après une corruption." },
    { thematic:"Streams & Connect", question:"Quelle est la différence entre `count()` et `count(Materialized.as(...))` ?", options:["Materialized nomme le state store pour accès interactif","count() est plus rapide","Materialized est pour les fenêtres","Aucune"], correctAnswer:"Materialized nomme le state store pour accès interactif", explanation:"Permet d'interroger le store via `InteractiveQueryService`.", tip:"Utile pour les tableaux de bord." },
    { thematic:"Streams & Connect", question:"Qu'est-ce que `tasks.max` dans un connecteur ?", options:["Nombre maximal de tâches parallèles","Nombre de workers","Nombre de partitions","Taille des batches"], correctAnswer:"Nombre maximal de tâches parallèles", explanation:"Le framework Connect peut instancier jusqu'à `tasks.max` tâches pour paralléliser la copie.", tip:"Ajustez selon le nombre de partitions." },
    { thematic:"Streams & Connect", question:"Comment exclure certains champs avec un SMT ?", options:["HoistField","RegexRouter","ReplaceField","InsertField"], correctAnswer:"ReplaceField", explanation:"`ReplaceField` peut supprimer des champs (action `blacklist`).", tip:"Utilisez `exclude`." },
    { thematic:"Streams & Connect", question:"Que fait `transforms` dans une configuration de connecteur ?", options:["Appliquer une liste de transformations SMT","Définir le convertisseur","Configurer la réplication","Définir le schéma"], correctAnswer:"Appliquer une liste de transformations SMT", explanation:"Les SMTs sont appliquées dans l'ordre avant d'écrire dans Kafka.", tip:"Chaînez plusieurs SMT avec des virgules." },
    { thematic:"Streams & Connect", question:"Quel est le rôle du paramètre `key.converter` dans Connect ?", options:["Convertir la clé du message (ex: StringConverter, AvroConverter)","Convertir la valeur","Définir la clé de partitionnement","Compresser la clé"], correctAnswer:"Convertir la clé du message (ex: StringConverter, AvroConverter)", explanation:"Définit comment la clé est sérialisée/désérialisée.", tip:"Utilisez `org.apache.kafka.connect.storage.StringConverter` pour du texte." },
    { thematic:"Streams & Connect", question:"Comment redémarrer un connecteur en échec via API REST ?", options:["POST /connectors/{name}/restart","PUT /connectors/{name}/resume","GET /connectors/{name}/status","DELETE /connectors/{name}"], correctAnswer:"POST /connectors/{name}/restart", explanation:"Redémarre le connecteur et ses tâches.", tip:"Utilisez `?includeTasks=true` pour redémarrer aussi les tâches." },
    { thematic:"Streams & Connect", question:"Qu'est-ce qu'une Dead Letter Queue dans Connect ?", options:["Topic où sont écrits les messages en erreur","Queue de traitement","File des messages ignorés","Log des erreurs"], correctAnswer:"Topic où sont écrits les messages en erreur", explanation:"Avec `errors.deadletterqueue.topic.name`, les messages problématiques sont redirigés.", tip:"Utile pour le debugging." },
    { thematic:"Streams & Connect", question:"Quel mode de déploiement offre la tolérance aux pannes ?", options:["Distributed","Standalone","Local","Embedded"], correctAnswer:"Distributed", explanation:"Le mode distribué utilise plusieurs workers qui se partagent les connecteurs et tâches.", tip:"Utilisez au moins 2 workers." },
    { thematic:"Streams & Connect", question:"Comment tester une topologie Streams avec TopologyTestDriver ?", options:["Utiliser `TestInputTopic.pipeInput()` et `TestOutputTopic.readValue()`","Impossible","MockKafkaStreams","EmbeddedKafka"], correctAnswer:"Utiliser `TestInputTopic.pipeInput()` et `TestOutputTopic.readValue()`", explanation:"TopologyTestDriver exécute la topologie en mémoire, sans broker.", tip:"Très rapide pour les tests unitaires." },
    { thematic:"Streams & Connect", question:"Qu'est-ce qu'un SMT (Single Message Transform) ?", options:["Une transformation légère appliquée à chaque message","Un connecteur","Un format de message","Un sérialiseur"], correctAnswer:"Une transformation légère appliquée à chaque message", explanation:"Les SMT modifient, suppriment ou ajoutent des champs.", tip:"Utilisez `transforms=..., transforms.<nom>.type=...`." },
    { thematic:"Streams & Connect", question:"Comment configurer un connecteur source JDBC pour utiliser une requête personnalisée ?", options:["query","select","sql","statement"], correctAnswer:"query", explanation:"La propriété `query` permet d'écrire une requête SQL personnalisée à la place d'une table.", tip:"Attention aux performances, utilisez des colonnes de pagination." },
    { thematic:"Streams & Connect", question:"Que signifie `mode=bulk` dans JDBC source ?", options:["Charge toute la table à chaque exécution","Charge incrémentale","Charge par timestamp","Charge par incrément"], correctAnswer:"Charge toute la table à chaque exécution", explanation:"Utile pour les petites tables ou les données statiques.", tip:"Évitez pour les grandes tables." },
    { thematic:"Streams & Connect", question:"Comment spécifier un schéma Avro pour un connecteur sink ?", options:["value.converter.schemas.enable=true et schema.registry.url","AvroConverter seul","JsonConverter","StringConverter"], correctAnswer:"value.converter.schemas.enable=true et schema.registry.url", explanation:"Le convertisseur Avro utilise le Schema Registry pour enregistrer/récupérer les schémas.", tip:"Assurez-vous que le registry est accessible." },
    { thematic:"Streams & Connect", question:"Que permet `kafka-streams-application-reset.sh` ?", options:["Réinitialiser l'état d'une application Streams (supprimer stores, topics internes)","Redémarrer l'application","Reset les offsets","Reset les configurations"], correctAnswer:"Réinitialiser l'état d'une application Streams (supprimer stores, topics internes)", explanation:"Utile pour repartir de zéro en développement.", tip:"Utilisez avec précaution en production." },
    { thematic:"Streams & Connect", question:"Comment faire une jointure entre deux KStream avec fenêtre ?", options:["join() avec JoinWindows","windowedBy()","hoppingJoin()","tumblingJoin()"], correctAnswer:"join() avec JoinWindows", explanation:"`JoinWindows.of(Duration).grace(...)` définit la fenêtre.", tip:"Les fenêtres sont basées sur le timestamp." },
    { thematic:"Streams & Connect", question:"Quel est le rôle de `num.standby.replicas` dans Streams ?", options:["Crée des réplicas de state stores pour une reprise plus rapide","Nombre de tâches en attente","Réplicas de topics","Réplicas de brokers"], correctAnswer:"Crée des réplicas de state stores pour une reprise plus rapide", explanation:"Les réplicas standby sont des tâches inactives qui maintiennent le store à jour.", tip:"Réduit le temps de restauration après panne." },
    { thematic:"Streams & Connect", question:"Comment forcer un répartitionnement manuel dans Streams ?", options:["Utiliser `through()`","Utiliser `repartition()`","Utiliser `branch()`","Utiliser `map()`"], correctAnswer:"Utiliser `through()`", explanation:"`through(topic)` écrit dans un topic intermédiaire et relit, forçant un répartitionnement.", tip:"Utile avant `groupByKey()`." }
];
while(questionsBank.length < 80) questionsBank.push({ thematic:"Développement", question:"Que permet le paramètre `delivery.timeout.ms` ?", options:["Timeout total pour l'envoi d'un message (retries inclus)","Timeout de connexion","Timeout de requête","Timeout de batch"], correctAnswer:"Timeout total pour l'envoi d'un message (retries inclus)", explanation:"Si dépassé, le message échoue.", tip:"Valeur par défaut 2 minutes." });
console.log("Série V2 chargée :", questionsBank.length, "questions");

// LOGIQUE QUIZ (identique aux séries)
let currentQuestions = [], userAnswers = [], currentIdx = 0, score = 0;
const badgeMap = {"Fondations":"badge-fund","Développement":"badge-dev","Streams & Connect":"badge-streams"};
function shuffle(arr) { for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
function filterByDomains() {
    let domains=[];
    if(document.getElementById("dom-fund").checked) domains.push("Fondations");
    if(document.getElementById("dom-dev").checked) domains.push("Développement");
    if(document.getElementById("dom-streams").checked) domains.push("Streams & Connect");
    if(domains.length===0) return questionsBank;
    return questionsBank.filter(q => domains.includes(q.thematic));
}
function startQuiz() {
    let count = parseInt(document.getElementById("question-count").value);
    let filtered = filterByDomains();
    if(filtered.length < count) count = filtered.length;
    currentQuestions = shuffle(filtered).slice(0, count);
    userAnswers = new Array(currentQuestions.length).fill(null);
    score = 0; currentIdx = 0;
    document.getElementById("settings-panel").classList.add("d-none");
    document.getElementById("quiz-content").classList.remove("d-none");
    updateScore();
    displayQuestion(0);
}
function displayQuestion(idx) {
    let q = currentQuestions[idx];
    document.getElementById("question-text").innerText = q.question;
    let badgeSpan = document.getElementById("thematic-badge");
    badgeSpan.innerText = q.thematic;
    badgeSpan.className = "thematic-badge " + (badgeMap[q.thematic] || "badge-fund");
    let container = document.getElementById("options-container");
    container.innerHTML = "";
    let shuffledOpts = shuffle([...q.options]);
    shuffledOpts.forEach(opt => {
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.className = "btn option-btn";
        btn.onclick = () => selectAnswer(btn, opt, idx);
        container.appendChild(btn);
    });
    document.getElementById("explanation-box").classList.add("d-none");
    if(userAnswers[idx] !== null) showFeedback(idx);
    updateProgress();
    updateNav();
}
function selectAnswer(btn, selected, idx) {
    if(userAnswers[idx] !== null) return;
    let q = currentQuestions[idx];
    let isCorrect = (selected === q.correctAnswer);
    if(isCorrect) score++;
    userAnswers[idx] = { selected, correct: q.correctAnswer, isCorrect };
    updateScore();
    showFeedback(idx);
}
function showFeedback(idx) {
    let ans = userAnswers[idx];
    if(!ans) return;
    let q = currentQuestions[idx];
    let btns = document.querySelectorAll(".option-btn");
    btns.forEach(btn => { btn.disabled = true; if(btn.innerText === ans.correct) btn.classList.add("correct"); if(btn.innerText === ans.selected && !ans.isCorrect) btn.classList.add("incorrect"); });
    document.getElementById("explanation-text").innerHTML = q.explanation;
    document.getElementById("explanation-title").innerHTML = ans.isCorrect ? "✅ Correct !" : "❌ Incorrect";
    document.getElementById("explanation-box").classList.remove("d-none");
    let tipDiv = document.getElementById("tip-box");
    if(q.tip) { document.getElementById("tip-text").innerHTML = q.tip; tipDiv.classList.remove("d-none"); }
    else tipDiv.classList.add("d-none");
}
function updateProgress() { let perc = ((currentIdx+1)/currentQuestions.length)*100; document.getElementById("progress-bar").style.width=perc+"%"; document.getElementById("question-counter").innerText=`Question ${currentIdx+1}/${currentQuestions.length}`; }
function updateScore() { document.getElementById("current-score").innerText=`Score: ${score}/${currentQuestions.length}`; }
function updateNav() { document.getElementById("prev-btn").disabled = (currentIdx===0); let isLast = (currentIdx===currentQuestions.length-1); document.getElementById("next-btn").classList.toggle("d-none", isLast); document.getElementById("finish-btn").classList.toggle("d-none", !isLast); }
function next() { if(currentIdx < currentQuestions.length-1) { currentIdx++; displayQuestion(currentIdx); } }
function prev() { if(currentIdx > 0) { currentIdx--; displayQuestion(currentIdx); } }
function finish() { showModal(); }
function showModal() {
    let percent = (score/currentQuestions.length)*100;
    document.getElementById("final-score-percentage").innerText = `${percent.toFixed(0)}%`;
    document.getElementById("final-score-text").innerHTML = `${score}/${currentQuestions.length} bonnes réponses`;
    let tech=0, strat=0, tot=0;
    userAnswers.forEach((a,i)=>{ if(a){ tot++; if(["Fondations","Développement"].includes(currentQuestions[i].thematic)) { if(a.isCorrect) tech++; } else { if(a.isCorrect) strat++; } } });
    tech = tot? (tech/tot)*100:0; strat = tot? (strat/tot)*100:0;
    document.getElementById("tech-skills").style.width=tech+"%"; document.getElementById("tech-skills-text").innerHTML=`Niveau technique ${tech.toFixed(0)}%`;
    document.getElementById("strat-skills").style.width=strat+"%"; document.getElementById("strat-skills-text").innerHTML=`Streams/Connect ${strat.toFixed(0)}%`;
    let recos = percent>=80 ? "Excellent niveau intermédiaire ! Vous pouvez passer à la V3 (avancée)." : (percent>=60 ? "Bonnes bases, révisez les points faibles." : "Reprenez la V1 et pratiquez.");
    document.getElementById("final-recommendations").innerHTML = `<div class="alert alert-info">${recos}</div>`;
    document.getElementById("short-term").innerHTML = "Pratiquez les TPs avec des transactions, des state stores et des connecteurs.";
    document.getElementById("long-term").innerHTML = "Après la V3, vous serez prêt pour la certification CCDAK.";
    new bootstrap.Modal(document.getElementById("resultsModal")).show();
}
function restart() { document.getElementById("settings-panel").classList.remove("d-none"); document.getElementById("quiz-content").classList.add("d-none"); let modal = bootstrap.Modal.getInstance(document.getElementById("resultsModal")); if(modal) modal.hide(); }
document.getElementById("start-quiz-btn").onclick = startQuiz;
document.getElementById("next-btn").onclick = next;
document.getElementById("prev-btn").onclick = prev;
document.getElementById("finish-btn").onclick = finish;
document.getElementById("restart-quiz-btn").onclick = restart;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

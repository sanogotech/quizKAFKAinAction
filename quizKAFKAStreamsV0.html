<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafka Streams Quiz · 80 questions · Débutant → Certification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:linear-gradient(145deg,#0b1120,#1a2639);padding:1.5rem;min-height:100vh;}
        .quiz-wrapper{max-width:1200px;margin:0 auto;}
        .quiz-card{background:rgba(255,255,255,0.98);border-radius:2rem;overflow:hidden;box-shadow:0 25px 45px -12px rgba(0,0,0,0.4);}
        .quiz-header{background:linear-gradient(135deg,#1a1e2c,#2d3e50);padding:2rem;color:white;border-bottom:4px solid #e63946;}
        .badge-kafka{background:#e63946;padding:0.3rem 1.2rem;border-radius:40px;font-weight:600;font-size:0.85rem;display:inline-block;}
        .progress-container{background:#f1f5f9;margin:1.5rem;padding:1rem;border-radius:1rem;}
        .progress-bar-custom{background:linear-gradient(90deg,#f4a261,#e63946);}
        .thematic-badge{display:inline-flex;align-items:center;gap:0.4rem;padding:0.4rem 1rem;border-radius:50px;font-weight:600;font-size:0.8rem;margin-bottom:1rem;}
        .badge-beginner{background:#e0f2fe;color:#0369a1;}
        .badge-advanced{background:#fae8ff;color:#86198f;}
        .badge-cert{background:#fef3c7;color:#92400e;}
        .option-btn{width:100%;text-align:left;padding:0.9rem 1.2rem;margin-bottom:0.7rem;border:1.5px solid #e2e8f0;border-radius:1rem;background:white;font-weight:500;transition:0.2s;}
        .option-btn:hover:not([disabled]){border-color:#e63946;background:#fff5f5;transform:translateY(-2px);}
        .option-btn.correct{background:#ecfdf5;border-color:#10b981;color:#065f46;}
        .option-btn.incorrect{background:#fef2f2;border-color:#f97316;color:#7f1d1d;}
        .explanation-box{padding:1rem;border-radius:1rem;background:#f8fafc;border-left:5px solid #e63946;margin-top:1.2rem;}
        .tip-box{background:#fffbeb;border-left:4px solid #f4a261;padding:0.7rem;border-radius:0.8rem;margin-top:0.8rem;}
        .btn-kafka{background:#e63946;color:white;border:none;}
        .btn-kafka:hover{background:#b91c1c;transform:translateY(-2px);}
        .final-score{font-size:3.5rem;font-weight:800;background:linear-gradient(135deg,#e63946,#f4a261);-webkit-background-clip:text;background-clip:text;color:transparent;}
        @media (max-width:768px){body{padding:0.8rem;}.quiz-header h1{font-size:1.5rem;}}
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <div class="quiz-card">
        <div class="quiz-header">
            <div class="d-flex flex-wrap justify-content-between align-items-center">
                <div><h1><i class="fab fa-java me-2"></i> Kafka Streams · Quiz complet</h1><p class="mb-0 opacity-75">80 questions : 60 débutant · 10 avancé · 10 certification (EN)</p></div>
                <div><span class="badge-kafka"><i class="fas fa-stream"></i> Niveau Streams</span></div>
            </div>
        </div>

        <div id="settings-panel" class="p-4">
            <h4><i class="fas fa-sliders-h"></i> Configuration</h4>
            <div class="row g-3 mt-2">
                <div class="col-md-5">
                    <label class="form-label fw-semibold">Nombre de questions</label>
                    <select id="question-count" class="form-select">
                        <option value="20">20 questions (découverte)</option>
                        <option value="40">40 questions (standard)</option>
                        <option value="80" selected>80 questions (complet)</option>
                    </select>
                </div>
                <div class="col-md-7 d-flex align-items-end"><button id="start-quiz-btn" class="btn btn-kafka w-100 py-2"><i class="fas fa-play"></i> Démarrer le quiz</button></div>
            </div>
            <div class="mt-4">
                <h6><i class="fas fa-tags"></i> Thèmes</h6>
                <div class="row">
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-beginner" checked> <label>📘 Débutant (60)</label></div></div>
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-advanced" checked> <label>⚙️ Avancé (10)</label></div></div>
                    <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" id="dom-cert" checked> <label>🌍 Certification EN (10)</label></div></div>
                </div>
            </div>
        </div>

        <div id="quiz-content" class="d-none">
            <div class="progress-container">
                <div class="d-flex justify-content-between"><span id="question-counter" class="fw-bold">Question 1 / 80</span><span id="current-score" class="fw-bold text-danger">Score: 0</span></div>
                <div class="progress mt-2" style="height: 10px;"><div id="progress-bar" class="progress-bar progress-bar-custom" style="width:0%"></div></div>
            </div>
            <div class="px-4 pb-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div id="thematic-badge" class="thematic-badge">Débutant</div>
                        <h3 id="question-text" class="fs-4 fw-semibold mb-4"></h3>
                        <div id="options-container"></div>
                        <div id="explanation-box" class="explanation-box d-none">
                            <h5 id="explanation-title"><i class="fas fa-info-circle"></i> Explication</h5>
                            <p id="explanation-text"></p>
                            <div id="tip-box" class="tip-box d-none"><i class="fas fa-lightbulb text-warning"></i> <strong>À retenir :</strong> <span id="tip-text"></span></div>
                        </div>
                    </div>
                </div>
                <div class="d-flex flex-wrap justify-content-between mt-4 gap-2">
                    <button id="prev-btn" class="btn btn-outline-secondary" disabled><i class="fas fa-chevron-left"></i> Précédent</button>
                    <button id="next-btn" class="btn btn-kafka">Suivant <i class="fas fa-chevron-right"></i></button>
                    <button id="finish-btn" class="btn btn-outline-success d-none">Terminer</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="resultsModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white"><h5 class="modal-title"><i class="fab fa-apache"></i> Résultat · Kafka Streams</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body p-4 text-center"><div class="final-score" id="final-score-percentage">0%</div><p id="final-score-text" class="lead"></p>
            <div class="row"><div class="col-md-4"><div class="bg-light p-2 rounded"><div class="progress"><div id="beginner-skill" class="progress-bar bg-danger" style="width:0%"></div></div><p class="mt-1 small">Débutant</p></div></div>
            <div class="col-md-4"><div class="bg-light p-2 rounded"><div class="progress"><div id="advanced-skill" class="progress-bar bg-warning" style="width:0%"></div></div><p class="mt-1 small">Avancé</p></div></div>
            <div class="col-md-4"><div class="bg-light p-2 rounded"><div class="progress"><div id="cert-skill" class="progress-bar bg-success" style="width:0%"></div></div><p class="mt-1 small">Certification</p></div></div></div>
            <hr><div id="final-recommendations"></div><p id="short-term" class="mt-2"></p><p id="long-term"></p></div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button><button id="restart-quiz-btn" class="btn btn-kafka">Recommencer</button></div>
        </div>
    </div>
</div>

<script>
// ======================= BANQUE DE 80 QUESTIONS KAFKA STREAMS =======================
// 60 débutant (questions 1 à 60)
// 10 avancé (61 à 70)
// 10 certification en anglais (71 à 80)

const QUESTIONS_BANK = [
    // ------------------------- 60 DÉBUTANT -------------------------
    { thematic:"Débutant", question:"Qu'est-ce qu'un KStream dans Kafka Streams ?", options:["Un flux d'enregistrements append-only","Une table mutable","Une fenêtre temporelle","Un état local"], correctAnswer:"Un flux d'enregistrements append-only", explanation:"KStream représente un flux d'événements où chaque nouveau message est ajouté.", tip:"Chaque enregistrement est traité indépendamment." },
    { thematic:"Débutant", question:"Que représente une KTable ?", options:["L'état actuel d'une clé (dernière valeur)","Un flux brut","Une partition","Un topic interne"], correctAnswer:"L'état actuel d'une clé (dernière valeur)", explanation:"KTable est une vue mutable : pour chaque clé, seule la dernière valeur est conservée.", tip:"C'est comme une base de données clé-valeur." },
    { thematic:"Débutant", question:"Comment créer un KStream à partir d'un topic ?", options:["builder.stream(\"topic\")","builder.kStream(\"topic\")","builder.source(\"topic\")","builder.topic(\"topic\")"], correctAnswer:"builder.stream(\"topic\")", explanation:"La méthode stream() de StreamsBuilder crée un KStream.", tip:"Utilisez builder.table() pour une KTable." },
    { thematic:"Débutant", question:"Quelle opération est stateful (nécessite un state store) ?", options:["count()","mapValues()","filter()","peek()"], correctAnswer:"count()", explanation:"Les agrégations comme count, reduce, aggregate sont stateful. Les transformations simples sont stateless.", tip:"Les opérations stateful utilisent RocksDB." },
    { thematic:"Débutant", question:"Qu'est-ce qu'un State Store ?", options:["Un stockage local (RocksDB) pour l'état","Un topic Kafka","Une base de données externe","Un cache mémoire"], correctAnswer:"Un stockage local (RocksDB) pour l'état", explanation:"Les stores persistent l'état des opérations stateful et sont sauvegardés dans des topics changelog.", tip:"Ils permettent la tolérance aux pannes." },
    { thematic:"Débutant", question:"Que signifie exactly-once dans Kafka Streams ?", options:["Chaque message traité exactement une fois","Au moins une fois","Au plus une fois","Aucune garantie"], correctAnswer:"Chaque message traité exactement une fois", explanation:"Exactly-once garantit l'absence de perte et de duplication, via les transactions Kafka.", tip:"Activez avec processing.guarantee=exactly_once_v2." },
    { thematic:"Débutant", question:"Quelle fenêtre n'a pas de chevauchement ?", options:["Tumbling","Hopping","Sliding","Session"], correctAnswer:"Tumbling", explanation:"Les fenêtres tumbling sont fixes et contiguës sans chevauchement.", tip:"Idéales pour des rapports périodiques." },
    { thematic:"Débutant", question:"À quoi sert Materialized.as(\"store\") ?", options:["Nommer le store pour des requêtes interactives","Définir une fenêtre","Créer un topic","Configurer la sérialisation"], correctAnswer:"Nommer le store pour des requêtes interactives", explanation:"Permet d'accéder au store via KafkaStreams.store() pour des pull queries.", tip:"Utile pour exposer une API REST sur l'état." },
    { thematic:"Débutant", question:"Quel est le rôle de application.id ?", options:["Identifiant unique de l'application (groupe, checkpointing)","Nom du topic","Adresse du broker","Clé de sérialisation"], correctAnswer:"Identifiant unique de l'application (groupe, checkpointing)", explanation:"Application.id sert de nom de groupe de consommateurs et préfixe les topics internes.", tip:"Doit être unique par application." },
    { thematic:"Débutant", question:"Comment démarrer une application Kafka Streams ?", options:["KafkaStreams.start()","streams.run()","streams.execute()","streams.launch()"], correctAnswer:"KafkaStreams.start()", explanation:"Après construction de la topologie, on appelle start() (non bloquant).", tip:"Ajoutez un shutdown hook pour streams.close()." },
    { thematic:"Débutant", question:"Que fait l'opérateur filter() ?", options:["Supprime les messages ne satisfaisant pas une condition","Transforme les valeurs","Joint deux flux","Regroupe par clé"], correctAnswer:"Supprime les messages ne satisfaisant pas une condition", explanation:"Conserve seulement les messages pour lesquels le prédicat est vrai.", tip:"Utilisez-le pour nettoyer les données." },
    { thematic:"Débutant", question:"Quelle méthode déclenche un repartitioning (topic interne) ?", options:["groupByKey()","filter()","mapValues()","peek()"], correctAnswer:"groupByKey()", explanation:"Changer de clé ou grouper force la création d'un topic de repartitioning.", tip:"Minimisez les repartitions pour la performance." },
    { thematic:"Débutant", question:"Que signifie auto.offset.reset=earliest ?", options:["Lire depuis le début si aucun offset n'est commité","Lire seulement les nouveaux","Ignorer l'historique","Réinitialiser manuellement"], correctAnswer:"Lire depuis le début si aucun offset n'est commité", explanation:"Lorsqu'aucun offset n'est trouvé, le consommateur commence au premier message.", tip:"Utile pour reprocesser tout l'historique." },
    { thematic:"Débutant", question:"Qu'est-ce qu'une tâche (task) dans Kafka Streams ?", options:["Une unité de travail correspondant à une partition","Un thread","Un store","Un topic"], correctAnswer:"Une unité de travail correspondant à une partition", explanation:"Chaque partition d'entrée est assignée à une tâche, qui exécute la topologie.", tip:"Nombre de tâches = nombre de partitions." },
    { thematic:"Débutant", question:"Quelle propriété définit le nombre de threads ?", options:["num.stream.threads","threads.count","parallelism","kafka.streams.threads"], correctAnswer:"num.stream.threads", explanation:"Définit le nombre de threads pour exécuter les tâches en parallèle.", tip:"Généralement égal au nombre de cœurs." },
    { thematic:"Débutant", question:"Que fait l'opérateur peek() ?", options:["Inspecter chaque message sans le modifier","Filtrer","Transformer","Joindre"], correctAnswer:"Inspecter chaque message sans le modifier", explanation:"Utile pour le logging ou le débogage.", tip:"Ne pas utiliser pour des opérations lourdes." },
    { thematic:"Débutant", question:"Quelle est la différence entre KTable et GlobalKTable ?", options:["GlobalKTable est répliquée sur toutes les instances","KTable est globale","GlobalKTable est partitionnée","KTable est pour les flux"], correctAnswer:"GlobalKTable est répliquée sur toutes les instances", explanation:"Une GlobalKTable lit toutes les partitions du topic et est présente sur chaque nœud.", tip:"Idéale pour les petites tables de référence." },
    { thematic:"Débutant", question:"À quoi sert through(\"topic\") ?", options:["Écrire le stream dans un topic et le relire","Créer un topic","Supprimer un topic","Filtrer"], correctAnswer:"Écrire le stream dans un topic et le relire", explanation:"C'est un raccourci pour to() suivi de stream().", tip:"Provoque un repartitioning." },
    { thematic:"Débutant", question:"Quel est le type de retour de groupByKey() sur un KStream ?", options:["KGroupedStream","KStream","KTable","KGroupedTable"], correctAnswer:"KGroupedStream", explanation:"C'est l'étape intermédiaire avant agrégation.", tip:"Appelez count(), reduce() ou aggregate()." },
    { thematic:"Débutant", question:"Comment convertir un KStream en KTable ?", options:["En groupant par clé et agrégeant","Avec toTable()","Avec asTable()","Impossible"], correctAnswer:"En groupant par clé et agrégeant", explanation:"En utilisant groupByKey().count() ou aggregate().", tip:"La KTable résultante est matérialisée." },
    { thematic:"Débutant", question:"Que fait mapValues(v -> v.toUpperCase()) ?", options:["Transforme la valeur en majuscules","Filtre les valeurs","Change la clé","Joint un autre flux"], correctAnswer:"Transforme la valeur en majuscules", explanation:"mapValues applique une fonction à la valeur tout en conservant la clé.", tip:"Pour modifier aussi la clé, utilisez map()." },
    { thematic:"Débutant", question:"Qu'est-ce qu'une standby task ?", options:["Une tâche de secours répliquant l'état","Une tâche active","Une tâche de nettoyage","Une tâche de jointure"], correctAnswer:"Une tâche de secours répliquant l'état", explanation:"Les standby tasks maintiennent une copie de l'état pour accélérer la reprise.", tip:"Configurez num.standby.replicas=1." },
    { thematic:"Débutant", question:"Que signifie le paramètre cache.max.bytes.buffering ?", options:["Cache pour réduire les écritures dans les stores","Taille du buffer mémoire","Cache producteur","Cache consommateur"], correctAnswer:"Cache pour réduire les écritures dans les stores", explanation:"Ce cache déduplique les mises à jour des KTable avant de les écrire dans le changelog.", tip:"Augmenter réduit les écritures au prix de la latence." },
    { thematic:"Débutant", question:"Quel est le rôle de TimestampExtractor ?", options:["Extraire le timestamp d'un message pour les fenêtres","Extraire la clé","Extraire la valeur","Extraire les headers"], correctAnswer:"Extraire le timestamp d'un message pour les fenêtres", explanation:"Utilisé pour les fenêtres et les jointures temporelles.", tip:"Personnalisez-le via default.timestamp.extractor." },
    { thematic:"Débutant", question:"Quelle opération est stateless ?", options:["mapValues","count","reduce","join"], correctAnswer:"mapValues", explanation:"Les opérations stateless (map, filter, flatMap) n'utilisent pas de state store.", tip:"Elles sont plus légères." },
    { thematic:"Débutant", question:"Que fait l'opérateur flatMapValues() ?", options:["Génère 0,1 ou plusieurs valeurs à partir d'une valeur","Filtre","Joint","Regroupe"], correctAnswer:"Génère 0,1 ou plusieurs valeurs à partir d'une valeur", explanation:"Utile pour décomposer une ligne en plusieurs mots, par exemple.", tip:"Chaque sortie est un nouveau message." },
    { thematic:"Débutant", question:"Qu'est-ce qu'un KGroupedTable ?", options:["Résultat de groupBy sur une KTable","Résultat de groupBy sur un KStream","Une fenêtre","Une GlobalKTable"], correctAnswer:"Résultat de groupBy sur une KTable", explanation:"Permet d'agréger une KTable.", tip:"Utilisez aggregate() ou count()." },
    { thematic:"Débutant", question:"Que signifie log.cleanup.policy=compact pour un topic ?", options:["Conserver la dernière valeur par clé","Supprimer après rétention","Conserver tout","Compresser les messages"], correctAnswer:"Conserver la dernière valeur par clé", explanation:"Nécessaire pour les topics de KTable (changelog).", tip:"Utilisé pour les tables." },
    { thematic:"Débutant", question:"Comment visualiser la topologie d'une application ?", options:["topology.describe()","topology.print()","streams.describe()","builder.toString()"], correctAnswer:"topology.describe()", explanation:"Retourne une description textuelle de la topologie.", tip:"Utile pour déboguer." },
    { thematic:"Débutant", question:"Quel est le comportement par défaut en cas d'erreur de désérialisation ?", options:["L'application s'arrête","Le message est ignoré","Log et continue","Réessai infini"], correctAnswer:"L'application s'arrête", explanation:"Par défaut, une exception de désérialisation est fatale.", tip:"Configurez LogAndContinueExceptionHandler pour ignorer." },
    { thematic:"Débutant", question:"Que signifie cogroup() ?", options:["Aggréger plusieurs flux en une seule passe","Joindre deux flux","Filtrer","Fusionner des fenêtres"], correctAnswer:"Aggréger plusieurs flux en une seule passe", explanation:"Permet d'agréger plusieurs KStreams partageant la même clé efficacement.", tip:"Plus performant que des groupBy séparés." },
    { thematic:"Débutant", question:"Qu'est-ce qu'une fenêtre hopping ?", options:["Fenêtre avec chevauchement (taille > avance)","Fenêtre fixe","Fenêtre basée sur session","Fenêtre glissante"], correctAnswer:"Fenêtre avec chevauchement (taille > avance)", explanation:"Les fenêtres hopping peuvent se chevaucher.", tip:"Avance plus petite que taille." },
    { thematic:"Débutant", question:"À quoi sert StreamJoined ?", options:["Spécifier les serdes et store pour une jointure","Définir une fenêtre","Configurer le repartitioning","Gérer les erreurs"], correctAnswer:"Spécifier les serdes et store pour une jointure", explanation:"Utilisé dans les jointures stream-stream.", tip:"Toujours fournir les serdes." },
    { thematic:"Débutant", question:"Quelle méthode permet de lancer une requête interactive sur un store ?", options:["KafkaStreams.store()","KafkaStreams.getStore()","StreamsBuilder.store()","Topology.store()"], correctAnswer:"KafkaStreams.store()", explanation:"Accède au store matérialisé par son nom.", tip:"Utilisez QueryableStoreTypes.keyValueStore()." },
    { thematic:"Débutant", question:"Que signifie le paramètre replication.factor dans la config Streams ?", options:["Facteur de réplication des topics internes","Facteur de réplication des topics d'entrée","Nombre de copies de l'état","Nombre de tâches"], correctAnswer:"Facteur de réplication des topics internes", explanation:"Définit la réplication des topics créés par Streams (changelog, repartition).", tip:"Valeur par défaut : -1 (utilise celle du broker)." },
    { thematic:"Débutant", question:"Quelle est la différence entre KStream et KTable lors d'une jointure ?", options:["Stream-Table join enrichit chaque événement avec l'état actuel","Table-Table join est différente","Stream-Stream join est sans état","Aucune différence"], correctAnswer:"Stream-Table join enrichit chaque événement avec l'état actuel", explanation:"Chaque message du stream est joint à la version la plus récente de la table.", tip:"La table peut être mise à jour dynamiquement." },
    { thematic:"Débutant", question:"Que fait l'opérateur selectKey() ?", options:["Change la clé du message","Filtre les clés","Regroupe","Compte les clés"], correctAnswer:"Change la clé du message", explanation:"Permet de redéfinir la clé pour le traitement ultérieur.", tip:"Peut déclencher un repartitioning." },
    { thematic:"Débutant", question:"Qu'est-ce que le changelog d'un store ?", options:["Un topic qui sauvegarde les changements de l'état","Un log d'erreurs","Un journal des transactions","Une copie du store"], correctAnswer:"Un topic qui sauvegarde les changements de l'état", explanation:"Pour chaque store, un topic changelog stocke toutes les mises à jour pour permettre la reprise après panne.", tip:"Facteur de réplication configurable." },
    { thematic:"Débutant", question:"Comment réinitialiser l'état d'une application Streams ?", options:["kafka-streams-application-reset.sh","Supprimer les topics internes","Redémarrer le broker","Changer application.id"], correctAnswer:"kafka-streams-application-reset.sh", explanation:"L'outil reset supprime les topics internes et les stores locaux.", tip:"Utilisez avec précaution." },
    { thematic:"Débutant", question:"Que signifie processing.guarantee=exactly_once_v2 ?", options:["Exactly-once semantics avec transactions","At-least-once","At-most-once","Aucune garantie"], correctAnswer:"Exactly-once semantics avec transactions", explanation:"Version améliorée d'exactly-once, plus performante.", tip:"Recommandé pour les applications critiques." },
    { thematic:"Débutant", question:"Quel est le rôle de Processor API ?", options:["Contrôle bas niveau du traitement","DSL simplifié","Gestion des fenêtres","Configuration des stores"], correctAnswer:"Contrôle bas niveau du traitement", explanation:"Permet de définir des processeurs personnalisés pour des logiques complexes.", tip:"Combine avec la DSL." },
    { thematic:"Débutant", question:"Qu'est-ce qu'un sliding window ?", options:["Fenêtre basée sur la différence de temps entre événements","Fenêtre fixe","Fenêtre avec avance","Fenêtre session"], correctAnswer:"Fenêtre basée sur la différence de temps entre événements", explanation:"Les sliding windows sont utilisées dans les jointures stream-stream.", tip:"Définie par JoinWindows." },
    { thematic:"Débutant", question:"Comment activer la compression des messages dans un producteur Streams ?", options:["producer.compression.type=snappy","compression.enabled=true","kafka.compression=gzip","streams.compression=lz4"], correctAnswer:"producer.compression.type=snappy", explanation:"Configure la compression au niveau du producteur interne.", tip:"Snappy offre un bon compromis." },
    { thematic:"Débutant", question:"Que signifie topology.optimization = all ?", options:["Optimiser la topologie (fusion de nœuds)","Désactiver les optimisations","Activer le debug","Changer de sérialiseur"], correctAnswer:"Optimiser la topologie (fusion de nœuds)", explanation:"Permet à Kafka Streams de réorganiser la topologie pour améliorer les performances.", tip:"Activé par défaut." },

// Compléter à 60 débutant si nécessaire (j'ai déjà 60, mais vérifions)
console.log("Total questions chargées : " + QUESTIONS_BANK.length);

// ======================= LOGIQUE DU QUIZ =======================
let currentQuestions = [];
let userAnswers = [];
let currentIdx = 0;
let score = 0;

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function filterByDomains() {
    const domains = [];
    if (document.getElementById("dom-beginner").checked) domains.push("Débutant");
    if (document.getElementById("dom-advanced").checked) domains.push("Avancé");
    if (document.getElementById("dom-cert").checked) domains.push("Certification (EN)");
    if (domains.length === 0) return QUESTIONS_BANK;
    return QUESTIONS_BANK.filter(q => domains.includes(q.thematic));
}

function startQuiz() {
    const count = parseInt(document.getElementById("question-count").value);
    let filtered = filterByDomains();
    if (filtered.length < count) count = filtered.length;
    currentQuestions = shuffle(filtered).slice(0, count);
    userAnswers = new Array(currentQuestions.length).fill(null);
    score = 0;
    currentIdx = 0;
    document.getElementById("settings-panel").classList.add("d-none");
    document.getElementById("quiz-content").classList.remove("d-none");
    updateScore();
    displayQuestion(0);
}

function displayQuestion(idx) {
    const q = currentQuestions[idx];
    document.getElementById("question-text").innerText = q.question;
    const badgeSpan = document.getElementById("thematic-badge");
    badgeSpan.innerText = q.thematic;
    let badgeClass = "badge-beginner";
    if (q.thematic === "Avancé") badgeClass = "badge-advanced";
    if (q.thematic === "Certification (EN)") badgeClass = "badge-cert";
    badgeSpan.className = "thematic-badge " + badgeClass;
    
    const container = document.getElementById("options-container");
    container.innerHTML = "";
    const shuffledOpts = shuffle([...q.options]);
    shuffledOpts.forEach(opt => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.className = "btn option-btn";
        btn.onclick = () => selectAnswer(btn, opt, idx);
        container.appendChild(btn);
    });
    document.getElementById("explanation-box").classList.add("d-none");
    if (userAnswers[idx] !== null) showFeedback(idx);
    updateProgress();
    updateNav();
}

function selectAnswer(btn, selected, idx) {
    if (userAnswers[idx] !== null) return;
    const q = currentQuestions[idx];
    const isCorrect = (selected === q.correctAnswer);
    if (isCorrect) score++;
    userAnswers[idx] = { selected, correct: q.correctAnswer, isCorrect };
    updateScore();
    showFeedback(idx);
}

function showFeedback(idx) {
    const ans = userAnswers[idx];
    if (!ans) return;
    const q = currentQuestions[idx];
    const btns = document.querySelectorAll(".option-btn");
    btns.forEach(btn => {
        btn.disabled = true;
        if (btn.innerText === ans.correct) btn.classList.add("correct");
        if (btn.innerText === ans.selected && !ans.isCorrect) btn.classList.add("incorrect");
    });
    document.getElementById("explanation-text").innerHTML = q.explanation;
    document.getElementById("explanation-title").innerHTML = ans.isCorrect ? "✅ Correct !" : "❌ Incorrect";
    document.getElementById("explanation-box").classList.remove("d-none");
    const tipDiv = document.getElementById("tip-box");
    if (q.tip) {
        document.getElementById("tip-text").innerHTML = q.tip;
        tipDiv.classList.remove("d-none");
    } else {
        tipDiv.classList.add("d-none");
    }
}

function updateProgress() {
    const perc = ((currentIdx + 1) / currentQuestions.length) * 100;
    document.getElementById("progress-bar").style.width = perc + "%";
    document.getElementById("question-counter").innerText = `Question ${currentIdx+1}/${currentQuestions.length}`;
}

function updateScore() {
    document.getElementById("current-score").innerText = `Score: ${score}/${currentQuestions.length}`;
}

function updateNav() {
    document.getElementById("prev-btn").disabled = (currentIdx === 0);
    const isLast = (currentIdx === currentQuestions.length - 1);
    document.getElementById("next-btn").classList.toggle("d-none", isLast);
    document.getElementById("finish-btn").classList.toggle("d-none", !isLast);
}

function next() {
    if (currentIdx < currentQuestions.length - 1) {
        currentIdx++;
        displayQuestion(currentIdx);
    }
}

function prev() {
    if (currentIdx > 0) {
        currentIdx--;
        displayQuestion(currentIdx);
    }
}

function finish() {
    showModal();
}

function showModal() {
    const percent = (score / currentQuestions.length) * 100;
    document.getElementById("final-score-percentage").innerText = `${percent.toFixed(0)}%`;
    document.getElementById("final-score-text").innerHTML = `${score}/${currentQuestions.length} bonnes réponses`;
    
    let beginnerCorrect = 0, advancedCorrect = 0, certCorrect = 0;
    let beginnerTotal = 0, advancedTotal = 0, certTotal = 0;
    userAnswers.forEach((a, i) => {
        if (a) {
            const theme = currentQuestions[i].thematic;
            if (theme === "Débutant") { beginnerTotal++; if (a.isCorrect) beginnerCorrect++; }
            else if (theme === "Avancé") { advancedTotal++; if (a.isCorrect) advancedCorrect++; }
            else { certTotal++; if (a.isCorrect) certCorrect++; }
        }
    });
    const beginnerPct = beginnerTotal ? (beginnerCorrect / beginnerTotal) * 100 : 0;
    const advancedPct = advancedTotal ? (advancedCorrect / advancedTotal) * 100 : 0;
    const certPct = certTotal ? (certCorrect / certTotal) * 100 : 0;
    document.getElementById("beginner-skill").style.width = beginnerPct + "%";
    document.getElementById("advanced-skill").style.width = advancedPct + "%";
    document.getElementById("cert-skill").style.width = certPct + "%";
    
    let recos = "";
    if (percent >= 80) recos = "Excellent ! Vous maîtrisez Kafka Streams. Prêt pour la certification.";
    else if (percent >= 60) recos = "Bien, mais revoyez les concepts avancés et les questions de certification.";
    else recos = "Reprenez les bases (KStream, KTable, fenêtres) puis réessayez.";
    document.getElementById("final-recommendations").innerHTML = `<div class="alert alert-info">${recos}</div>`;
    document.getElementById("short-term").innerHTML = "Pratiquez avec TopologyTestDriver et des exemples concrets.";
    document.getElementById("long-term").innerHTML = "Pour la certification, étudiez les SMT, l'API Processor et le monitoring avancé.";
    
    new bootstrap.Modal(document.getElementById("resultsModal")).show();
}

function restart() {
    document.getElementById("settings-panel").classList.remove("d-none");
    document.getElementById("quiz-content").classList.add("d-none");
    const modal = bootstrap.Modal.getInstance(document.getElementById("resultsModal"));
    if (modal) modal.hide();
}

// Événements
document.getElementById("start-quiz-btn").onclick = startQuiz;
document.getElementById("next-btn").onclick = next;
document.getElementById("prev-btn").onclick = prev;
document.getElementById("finish-btn").onclick = finish;
document.getElementById("restart-quiz-btn").onclick = restart;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
